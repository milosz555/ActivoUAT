            const map = L.map(mapRef.current).setView([item.lat, item.lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            const icon = L.divIcon({ html: `<div style="background:#0b3d91;color:white;padding:6px 10px;border-radius:20px;font-family:Poppins;font-weight:700;font-size:12px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3)">🎾 ${item.name}</div>`, className: '', iconAnchor: [0, 0] });
            L.marker([item.lat, item.lng], { icon }).addTo(map);
            mapInstance.current = map;
            return () => { map.remove(); mapInstance.current = null; };
        }, [item]);
        return (
            <div className="map-modal" onClick={e => e.target === e.currentTarget && onClose()}>
                <div className="map-modal-content">
                    <div className="map-modal-header"><h3>{item.name}</h3><button className="btn-close" onClick={onClose}>✕</button></div>
                    <div id="map-container" ref={mapRef}></div>
                    <div className="map-info-row"><i className="fas fa-map-marker-alt"></i> {item.address}</div>
                    <div className="map-info-row"><i className="fas fa-layer-group"></i> Nawierzchnia: {item.surface}</div>
                    <button className="btn-apply" style={{marginTop:10}} onClick={() => window.open(`http://maps.google.com/?q=${item.lat},${item.lng}`, '_blank')}>
                        <i className="fas fa-external-link-alt"></i> Otwórz w Google Maps
                    </button>
                </div>
            </div>
        );
    }

    /* ─────────────────────────── EDIT SHEET ────────────────────────── */
    /*
     * entry      – the game object being edited
     * isOwner    – true = user added this game; false = it was shared with them (can edit some fields, cannot delete)
     * friendsList– [{uid, name}] for opponent dropdowns
     * onSave(updatedEntry) – callback
     * onDelete() – callback (only called when isOwner)
     * onClose()  – callback
     */
    function EditGameSheet({ entry, isOwner, friendsList, onSave, onDelete, onClose }) {
        const [court, setCourt] = useState(entry.court || DATA[0].name);
        const [date, setDate] = useState(entry.date || new Date().toISOString().split('T')[0]);
        const [sport, setSport] = useState(entry.sport || 'tenis');
        const [score, setScore] = useState(entry.score || '');
        const [result, setResult] = useState(entry.result || '');
        // For tenis: single opponent uid
        const [opponentUid, setOpponentUid] = useState(entry.opponentUid || '');
        // For padel: up to 3 opponents (array of uid strings)
        const [padelOpponents, setPadelOpponents] = useState(
            entry.padelOpponentUids ? [...entry.padelOpponentUids, '', '', ''].slice(0, 3) : ['', '', '']
        );
        const [showConfirm, setShowConfirm] = useState(false);
        const [saving, setSaving] = useState(false);

        const setPadelOpp = (idx, val) => {
            const copy = [...padelOpponents];
            copy[idx] = val;
            setPadelOpponents(copy);
        };

        const friendOptions = (excludeUids = []) =>
            friendsList.filter(f => !excludeUids.includes(f.uid));

        const handleSave = async () => {
            setSaving(true);

            let opponentName = '';
            let padelOpponentNames = [];
            let padelOpponentUids = [];

            if (sport === 'tenis') {
                if (opponentUid) {
                    opponentName = friendsList.find(f => f.uid === opponentUid)?.name || '';
                }
            } else {
                padelOpponentUids = padelOpponents.filter(Boolean);
                padelOpponentNames = padelOpponentUids.map(uid => friendsList.find(f => f.uid === uid)?.name || uid);
            }

            const updated = {
                ...entry,
                court,
                date,
                sport,
                score,
                result,
                ...(sport === 'tenis'
                    ? { opponent: opponentName, opponentUid }
                    : { padelOpponents: padelOpponentNames, padelOpponentUids }),
            };
            // clean up stale keys when switching sport
            if (sport === 'tenis') { delete updated.padelOpponents; delete updated.padelOpponentUids; }
            else { delete updated.opponent; delete updated.opponentUid; }

            await onSave(updated);
            setSaving(false);
        };

        const usedUids = padelOpponents.filter(Boolean);

        return (
            <>
                {showConfirm && (
                    <ConfirmPopup
                        onConfirm={() => { setShowConfirm(false); onDelete(); }}
                        onCancel={() => setShowConfirm(false)}
                    />
                )}
                <div className="sheet-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
                    <div className="edit-sheet">
                        <div className="edit-sheet-header">
                            <h3>{isOwner ? 'Edytuj rozgrywkę' : 'Twój wynik w tej grze'}</h3>
                            <button className="btn-close" onClick={onClose}>✕</button>
                        </div>

                        {/* Sport – editable only by owner */}
                        {isOwner ? (
                            <>
                                <label>Dyscyplina</label>
                                <div className="sport-selector" style={{marginBottom:0}}>
                                    <button type="button" className={`sport-option ${sport==='tenis'?'selected-tenis':''}`} onClick={() => setSport('tenis')}>🎾 Tenis</button>
                                    <button type="button" className={`sport-option ${sport==='padel'?'selected-padel':''}`} onClick={() => setSport('padel')}>🏓 Padel</button>
                                </div>
                            </>
                        ) : (
                            <>
                                <label>Dyscyplina</label>
                                <div style={{fontSize:'0.9em',padding:'8px 0',color:'#333'}}>{sportEmoji[entry.sport]} {sportLabel[entry.sport]}</div>
                                <div className="read-only-note"><i className="fas fa-lock" style={{marginRight:4}}></i>Dyscyplinę i uczestników może edytować tylko twórca gry.</div>
                            </>
                        )}

                        {/* Court + Date – owner only */}
                        {isOwner && (
                            <>
                                <label>Obiekt</label>
                                <select value={court} onChange={e => setCourt(e.target.value)}>
                                    {DATA.map(d => <option key={d.id} value={d.name}>{d.name}</option>)}
                                </select>
                                <label>Data</label>
                                <input type="date" value={date} onChange={e => setDate(e.target.value)} />
                            </>
                        )}

                        {/* Opponents – owner only */}
                        {isOwner && sport === 'tenis' && (
                            <>
                                <label>Przeciwnik <span style={{fontWeight:400,color:'#aaa'}}>(opcjonalnie)</span></label>
                                <div className="opponent-select-wrap">
                                    <select value={opponentUid} onChange={e => setOpponentUid(e.target.value)}>
                                        <option value="">— nie wybrano —</option>
                                        {friendsList.map(f => <option key={f.uid} value={f.uid}>{f.name}</option>)}
                                    </select>
                                </div>
                            </>
                        )}
                        {isOwner && sport === 'padel' && (
                            <>
                                <label>Gracze (do 3 osób) <span style={{fontWeight:400,color:'#aaa'}}>(opcjonalnie)</span></label>
                                {[0, 1, 2].map(idx => {
                                    const otherSelected = padelOpponents.filter((_, i) => i !== idx).filter(Boolean);
                                    return (
                                        <div key={idx} className="opponent-select-wrap" style={{marginBottom: idx < 2 ? 6 : 0}}>
                                            <select value={padelOpponents[idx]} onChange={e => setPadelOpp(idx, e.target.value)}>
                                                <option value="">— Gracz {idx + 1} —</option>
                                                {friendsList
                                                    .filter(f => !otherSelected.includes(f.uid))
                                                    .map(f => <option key={f.uid} value={f.uid}>{f.name}</option>)
                                                }
                                            </select>
                                        </div>
                                    );
                                })}
                                {friendsList.length === 0 && (
                                    <div className="no-friends-note">Dodaj znajomych, aby ich tu wybrać.</div>
                                )}
                            </>
                        )}

                        {/* Score + Result – editable by everyone (owner & shared players) */}
                        <label>Wynik <span style={{fontWeight:400,color:'#aaa'}}>(np. 6:3)</span></label>
                        <input type="text" placeholder="np. 6:3" value={score} onChange={e => setScore(e.target.value)} />

                        <label>Rezultat</label>
                        <select value={result} onChange={e => setResult(e.target.value)}>
                            <option value="">— nie podawaj —</option>
                            <option value="W">🏆 Wygrana</option>
                            <option value="L">❌ Przegrana</option>
                            <option value="D">🤝 Remis</option>
                        </select>

                        <button className="btn-save-edit" onClick={handleSave} disabled={saving}>
                            {saving ? 'Zapisywanie...' : '✔ Zapisz zmiany'}
                        </button>

                        {isOwner && (
                            <button className="btn-delete-game" onClick={() => setShowConfirm(true)}>
                                <i className="fas fa-trash-alt"></i> Usuń rozgrywkę
                            </button>
                        )}
                    </div>
                </div>
            </>
        );
    }

    /* ─────────────────────────── AUTH ──────────────────────────────── */
    function translateError(code) {
        const map = {
            'auth/email-already-in-use': 'Ten adres e-mail jest już zarejestrowany.',
            'auth/invalid-email': 'Nieprawidłowy adres e-mail.',
            'auth/weak-password': 'Hasło jest za słabe (min. 6 znaków).',
            'auth/user-not-found': 'Nie znaleziono konta z tym adresem e-mail.',
            'auth/wrong-password': 'Nieprawidłowe hasło.',
            'auth/invalid-credential': 'Nieprawidłowy e-mail lub hasło.',
            'auth/too-many-requests': 'Zbyt wiele prób. Spróbuj ponownie za chwilę.',
        };
        return map[code] || 'Wystąpił błąd. Spróbuj ponownie.';
    }

    function AuthScreen() {
        const [tab, setTab] = useState('login');
        const [name, setName] = useState('');
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [error, setError] = useState('');
        const [success, setSuccess] = useState('');
        const [loading, setLoading] = useState(false);
        const fb = window.__firebase;

        const handleRegister = async () => {
            setError(''); setSuccess('');
            if (!name.trim()) return setError('Podaj swoje imię.');
            if (!email.trim()) return setError('Podaj adres e-mail.');
            if (password.length < 6) return setError('Hasło musi mieć min. 6 znaków.');
            setLoading(true);
            try {
                const cred = await fb.createUserWithEmailAndPassword(fb.auth, email.trim(), password);
                const uid = cred.user.uid;
                await fb.updateProfile(cred.user, { displayName: name.trim() });
                await fb.setDoc(fb.doc(fb.db, 'users', uid), {
                    uid, name: name.trim(), email: email.trim().toLowerCase(),
                    createdAt: fb.serverTimestamp(), role: 'user'
                });
                await fb.signOut(fb.auth);
                setSuccess('Konto utworzone! Teraz się zaloguj.');
                setTab('login'); setName(''); setPassword('');
            } catch (e) { setError(translateError(e.code)); }
            setLoading(false);
        };

        const handleLogin = async () => {
            setError(''); setSuccess('');
            if (!email.trim()) return setError('Podaj adres e-mail.');
            if (!password.trim()) return setError('Podaj hasło.');
            setLoading(true);
            try {
                await fb.signInWithEmailAndPassword(fb.auth, email.trim().toLowerCase(), password);
            } catch (e) { setError(translateError(e.code)); }
            setLoading(false);
        };

        return (
            <div className="auth-container">
                <div className="auth-tabs">
                    <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={() => { setTab('login'); setError(''); setSuccess(''); }}>Logowanie</button>
                    <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={() => { setTab('register'); setError(''); setSuccess(''); }}>Rejestracja</button>
                </div>
                <div className="auth-form">
                    {tab === 'login' ? <><h2>Witaj z powrotem 👋</h2><p>Zaloguj się, aby rezerwować korty.</p></> : <><h2>Utwórz konto 🎾</h2><p>Dołącz do Activo i rezerwuj korty w kilka sekund.</p></>}
                    {tab === 'register' && <div className="form-group"><label>Imię</label><input type="text" placeholder="np. Kamil" value={name} onChange={e => setName(e.target.value)} /></div>}
                    <div className="form-group"><label>Adres e-mail</label><input type="email" placeholder="twoj@email.pl" value={email} onChange={e => setEmail(e.target.value)} /></div>
                    <div className="form-group">
                        <label>Hasło {tab==='register' && <span style={{color:'#aaa',fontWeight:400}}>(min. 6 znaków)</span>}</label>
                        <input type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key==='Enter' && (tab==='login' ? handleLogin() : handleRegister())} />
                    </div>
                    {error && <div className="auth-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}
                    {success && <div className="auth-success"><i className="fas fa-check-circle"></i> {success}</div>}
                    <button className={`btn-apply ${loading?'btn-loading':''}`} onClick={tab==='login' ? handleLogin : handleRegister}>
                        {loading ? 'Proszę czekać...' : tab==='login' ? 'Zaloguj się' : 'Zarejestruj się'}
                    </button>
                </div>
            </div>
        );
    }

    /* ─────────────────────────── PROFILE ───────────────────────────── */
    function ProfileScreen({ user }) {
        const fb = window.__firebase;
        const [profileTab, setProfileTab] = useState('info');

        // own games
        const [playedList, setPlayedList] = useState([]);
        // games shared to this user by others
        const [sharedGames, setSharedGames] = useState([]);

        const [showAddPlayed, setShowAddPlayed] = useState(false);
        const [editEntry, setEditEntry] = useState(null); // {entry, idx, isOwner}

        // add form state
        const [selectedCourt, setSelectedCourt] = useState(DATA[0].name);
        const [playedDate, setPlayedDate] = useState(new Date().toISOString().split('T')[0]);
        const [playedSport, setPlayedSport] = useState('tenis');
        const [playedOpponentUid, setPlayedOpponentUid] = useState('');
        const [padelOpponents, setPadelOpponents] = useState(['', '', '']);
        const [playedScore, setPlayedScore] = useState('');
        const [playedResult, setPlayedResult] = useState('');
        const [saving, setSaving] = useState(false);

        const [friendsList, setFriendsList] = useState([]);
        const [loadingFriends, setLoadingFriends] = useState(false);

        const [editName, setEditName] = useState(user.displayName || '');
        const [editSaving, setEditSaving] = useState(false);
        const [editMsg, setEditMsg] = useState('');
        const [showFavourites, setShowFavourites] = useState(true);
        const [showHistory, setShowHistory] = useState(true);

        const userDocRef = fb.doc(fb.db, 'users', user.uid);

        useEffect(() => {
            fb.getDoc(userDocRef).then(snap => {
                if (!snap.exists()) return;
                const data = snap.data();
                setPlayedList(data.playedHistory || []);
                setSharedGames(data.sharedGames || []);
                if (data.privacy) {
                    setShowFavourites(data.privacy.showFavourites !== false);
                    setShowHistory(data.privacy.showHistory !== false);
                }
                const friendUids = data.friends || [];
                if (friendUids.length > 0) {
                    setLoadingFriends(true);
                    Promise.all(friendUids.map(uid => fb.getDoc(fb.doc(fb.db, 'users', uid))))
                        .then(snaps => {
                            setFriendsList(snaps.filter(s => s.exists()).map(s => ({ uid: s.id, name: s.data().name || s.data().email || s.id })));
                            setLoadingFriends(false);
                        });
                }
            });
        }, [user.uid]);

        const setPadelOpp = (idx, val) => {
            const copy = [...padelOpponents];
            copy[idx] = val;
            setPadelOpponents(copy);
        };

        /* ── Save new game ── */
        const addPlayedEntry = async () => {
            setSaving(true);
            const gameId = `game_${Date.now()}_${user.uid}`;

            let opponentName = '';
            let padelOpponentNames = [];
            let padelOpponentUids = [];

            if (playedSport === 'tenis') {
                opponentName = playedOpponentUid ? (friendsList.find(f => f.uid === playedOpponentUid)?.name || '') : '';
            } else {
                padelOpponentUids = padelOpponents.filter(Boolean);
                padelOpponentNames = padelOpponentUids.map(uid => friendsList.find(f => f.uid === uid)?.name || uid);
            }

            const entry = {
                gameId,
                ownerUid: user.uid,
                court: selectedCourt,
                date: playedDate,
                sport: playedSport,
                addedAt: new Date().toISOString(),
                ...(playedSport === 'tenis'
                    ? { ...(opponentName && { opponent: opponentName, opponentUid: playedOpponentUid }) }
                    : { padelOpponents: padelOpponentNames, padelOpponentUids }),
                ...(playedScore.trim() && { score: playedScore.trim() }),
                ...(playedResult && { result: playedResult }),
            };

            // Save to owner's playedHistory
            const newOwnerList = [entry, ...playedList].slice(0, 50);
            await fb.setDoc(userDocRef, { playedHistory: newOwnerList }, { merge: true });
            setPlayedList(newOwnerList);

            // Share to each participant's sharedGames
            const participantUids = playedSport === 'tenis'
                ? (playedOpponentUid ? [playedOpponentUid] : [])
                : padelOpponentUids;

            const ownerName = user.displayName || user.email || 'Ktoś';
            for (const uid of participantUids) {
                const pRef = fb.doc(fb.db, 'users', uid);
                const pSnap = await fb.getDoc(pRef);
                if (pSnap.exists()) {
                    const existing = pSnap.data().sharedGames || [];
                    const sharedEntry = { ...entry, sharedWith: uid, ownerName };
                    const updated = [sharedEntry, ...existing].slice(0, 50);
                    await fb.setDoc(pRef, { sharedGames: updated }, { merge: true });
                }
            }

            // Reset form
            setShowAddPlayed(false);
            setPlayedOpponentUid('');
            setPadelOpponents(['', '', '']);
            setPlayedScore('');
            setPlayedResult('');
            setPlayedSport('tenis');
            setSaving(false);
        };

        /* ── Save edited own game ── */
        const saveEditedOwnGame = async (updatedEntry) => {
            const newList = playedList.map((e, i) => i === editEntry.idx ? updatedEntry : e);
            await fb.setDoc(userDocRef, { playedHistory: newList }, { merge: true });
            setPlayedList(newList);

            // Also update this entry in all participants' sharedGames
            const participantUids = updatedEntry.padelOpponentUids
                ? updatedEntry.padelOpponentUids
                : updatedEntry.opponentUid ? [updatedEntry.opponentUid] : [];

            for (const uid of participantUids) {
                const pRef = fb.doc(fb.db, 'users', uid);
                const pSnap = await fb.getDoc(pRef);
                if (pSnap.exists()) {
                    const existing = pSnap.data().sharedGames || [];
                    const updated = existing.map(e => e.gameId === updatedEntry.gameId
                        ? { ...updatedEntry, sharedWith: uid, ownerName: user.displayName || user.email }
                        : e
                    );
                    await fb.setDoc(pRef, { sharedGames: updated }, { merge: true });
                }
            }

            setEditEntry(null);
        };

        /* ── Save edited shared game (only score/result) ── */
        const saveEditedSharedGame = async (updatedEntry) => {
            const newList = sharedGames.map((e, i) => i === editEntry.idx ? updatedEntry : e);
            await fb.setDoc(userDocRef, { sharedGames: newList }, { merge: true });
            setSharedGames(newList);
            setEditEntry(null);
        };

        /* ── Delete own game ── */
        const deleteOwnGame = async () => {
            const entry = playedList[editEntry.idx];
            const newList = playedList.filter((_, i) => i !== editEntry.idx);
            await fb.setDoc(userDocRef, { playedHistory: newList }, { merge: true });
            setPlayedList(newList);
            setEditEntry(null);
        };

        /* ── Profile helpers ── */
        const handleLogout = async () => { await fb.signOut(fb.auth); };

        const saveEditName = async () => {
            if (!editName.trim()) return setEditMsg('Imię nie może być puste.');
            setEditSaving(true);
            try {
                await fb.updateProfile(fb.auth.currentUser, { displayName: editName.trim() });
                await fb.setDoc(userDocRef, { name: editName.trim() }, { merge: true });
                setEditMsg('✅ Imię zostało zaktualizowane!');
            } catch(e) { setEditMsg('Błąd zapisu. Spróbuj ponownie.'); }
            setEditSaving(false);
        };

        const savePrivacy = async (key, value) => {
            await fb.setDoc(userDocRef, { privacy: { showFavourites, showHistory, [key]: value } }, { merge: true });
        };

        const handlePrivacyToggle = (key, value) => {
            if (key === 'showFavourites') setShowFavourites(value);
            if (key === 'showHistory') setShowHistory(value);
            savePrivacy(key, value);
        };

        const initials = (user.displayName || user.email || 'U').charAt(0).toUpperCase();
        const joinDate = user.metadata?.creationTime
            ? new Date(user.metadata.creationTime).toLocaleDateString('pl-PL', { year: 'numeric', month: 'long' })
            : '—';

        /* ── Render one history entry row ── */
        const renderEntry = (entry, idx, isOwner) => {
            const players = entry.sport === 'padel'
                ? (entry.padelOpponents || [])
                : entry.opponent ? [entry.opponent] : [];

            return (
                <div key={`${isOwner?'own':'sh'}-${idx}`} className="played-entry">
                    <div className="played-entry-top">
                        <div className="played-entry-left">
                            <strong>
                                <span className={`sport-badge sport-${entry.sport || 'tenis'}`}>
                                    {sportEmoji[entry.sport] || '🎾'} {sportLabel[entry.sport] || 'Tenis'}
                                </span>
                                {entry.court}
                                {entry.result && <span className={`result-badge result-${entry.result}`} style={{marginLeft:5}}>{resultLabel[entry.result]}</span>}
                                {!isOwner && <span className="shared-badge shared-badge-received"><i className="fas fa-share-alt"></i> {entry.ownerName}</span>}
                            </strong>
                            <span className="date-line">{new Date(entry.date).toLocaleDateString('pl-PL')}</span>
                            <div className="played-entry-details">
                                {players.length > 0 && <span><i className="fas fa-users"></i> {players.join(', ')}</span>}
                                {entry.score && <span><i className="fas fa-table-tennis"></i> {entry.score}</span>}
                            </div>
                        </div>
                        <div className="played-entry-actions">
                            <button className="btn-edit-entry" title="Edytuj" onClick={() => setEditEntry({ entry, idx, isOwner })}>
                                <i className="fas fa-pen"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const allEntries = [
            ...playedList.map((e, i) => ({ e, i, own: true })),
            ...sharedGames.map((e, i) => ({ e, i, own: false })),
        ].sort((a, b) => new Date(b.e.date) - new Date(a.e.date));

        return (
            <div>
                {editEntry && (
                    <EditGameSheet
                        entry={editEntry.entry}
                        isOwner={editEntry.isOwner}
                        friendsList={friendsList}
                        onSave={editEntry.isOwner ? saveEditedOwnGame : saveEditedSharedGame}
                        onDelete={deleteOwnGame}
                        onClose={() => setEditEntry(null)}
                    />
                )}

                <div className="profile-header">
                    <div className="profile-avatar-big">{initials}</div>
                    <div className="profile-name">{user.displayName || 'Użytkownik'}</div>
                    <div className="profile-email">{user.email}</div>
                    <button className="btn-edit-profile" onClick={() => setProfileTab('edit')}>
                        <i className="fas fa-pen"></i> Edytuj profil
                    </button>
                </div>

                <div className="profile-tabs">
                    <button className={`profile-tab ${profileTab==='info'?'active':''}`} onClick={() => setProfileTab('info')}><i className="fas fa-user"></i> Profil</button>
                    <button className={`profile-tab ${profileTab==='history'?'active':''}`} onClick={() => setProfileTab('history')}><i className="fas fa-history"></i> Historia</button>
                    <button className={`profile-tab ${profileTab==='edit'?'active':''}`} onClick={() => setProfileTab('edit')}><i className="fas fa-cog"></i> Ustawienia</button>
                </div>

                <div className="profile-body">
                    {profileTab === 'info' && (<>
                        <div className="profile-card">
                            <h4><i className="fas fa-user" style={{color:'var(--primary)',marginRight:6}}></i> Dane konta</h4>
                            <div className="profile-row"><span>Imię</span><span>{user.displayName || '—'}</span></div>
                            <div className="profile-row"><span>E-mail</span><span>{user.email}</span></div>
                            <div className="profile-row"><span>Konto od</span><span>{joinDate}</span></div>
                            <div className="profile-row"><span>Gier w historii</span><span>{playedList.length + sharedGames.length}</span></div>
                            <div className="profile-row"><span>Status</span><span style={{color:'var(--primary)'}}>✔ Aktywny</span></div>
                        </div>
                        <div className="profile-card">
                            <h4><i className="fas fa-shield-alt" style={{color:'var(--primary)',marginRight:6}}></i> Prywatność</h4>
                            <div className="privacy-row">
                                <div className="privacy-label">Ulubione obiekty<small>Znajomi widzą Twoje polubione korty</small></div>
                                <label className="toggle-wrap"><input type="checkbox" checked={showFavourites} onChange={e => handlePrivacyToggle('showFavourites', e.target.checked)} /><span className="toggle-slider"></span></label>
                            </div>
                            <div className="privacy-row">
                                <div className="privacy-label">Historia gier<small>Znajomi widzą gdzie ostatnio grałeś</small></div>
                                <label className="toggle-wrap"><input type="checkbox" checked={showHistory} onChange={e => handlePrivacyToggle('showHistory', e.target.checked)} /><span className="toggle-slider"></span></label>
                            </div>
                        </div>
                    </>)}

                    {profileTab === 'history' && (
                        <div className="profile-card">
                            <h4 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <span><i className="fas fa-history" style={{color:'var(--primary)',marginRight:6}}></i> Moje gry</span>
                                <button className="btn-add-small" style={{width:'auto',padding:'5px 12px',marginTop:0}} onClick={() => setShowAddPlayed(!showAddPlayed)}>
                                    <i className="fas fa-plus"></i> Dodaj
                                </button>
                            </h4>

                            {showAddPlayed && (
                                <div className="add-played-form">
                                    <label>Dyscyplina *</label>
                                    <div className="sport-selector">
                                        <button type="button" className={`sport-option ${playedSport==='tenis'?'selected-tenis':''}`} onClick={() => setPlayedSport('tenis')}>🎾 Tenis</button>
                                        <button type="button" className={`sport-option ${playedSport==='padel'?'selected-padel':''}`} onClick={() => setPlayedSport('padel')}>🏓 Padel</button>
                                    </div>

                                    <label>Obiekt *</label>
                                    <select value={selectedCourt} onChange={e => setSelectedCourt(e.target.value)}>
                                        {DATA.map(d => <option key={d.id} value={d.name}>{d.name}</option>)}
                                    </select>

                                    <label>Data *</label>
                                    <input type="date" value={playedDate} onChange={e => setPlayedDate(e.target.value)} />

                                    {playedSport === 'tenis' && (<>
                                        <label>Z kim grałem? <span style={{fontWeight:400,color:'#aaa'}}>(opcjonalnie)</span></label>
                                        <div className="opponent-select-wrap">
                                            <select value={playedOpponentUid} onChange={e => setPlayedOpponentUid(e.target.value)} disabled={loadingFriends}>
                                                <option value="">— nie wybrano —</option>
                                                {loadingFriends && <option disabled>Ładowanie znajomych...</option>}
                                                {friendsList.map(f => <option key={f.uid} value={f.uid}>{f.name}</option>)}
                                            </select>
                                        </div>
                                        {!loadingFriends && friendsList.length === 0 && <div className="no-friends-note">Dodaj znajomych, aby ich tu wybrać.</div>}
                                    </>)}

                                    {playedSport === 'padel' && (<>
                                        <label>Gracze (do 3 osób) <span style={{fontWeight:400,color:'#aaa'}}>(opcjonalnie)</span></label>
                                        {[0, 1, 2].map(idx => {
                                            const otherSelected = padelOpponents.filter((_, i) => i !== idx).filter(Boolean);
                                            return (
                                                <div key={idx} className="opponent-select-wrap" style={{marginBottom: idx < 2 ? 6 : 0}}>
                                                    <select value={padelOpponents[idx]} onChange={e => setPadelOpp(idx, e.target.value)}>
                                                        <option value="">— Gracz {idx + 1} —</option>
                                                        {friendsList.filter(f => !otherSelected.includes(f.uid)).map(f => <option key={f.uid} value={f.uid}>{f.name}</option>)}
                                                    </select>
                                                </div>
                                            );
                                        })}
                                        {!loadingFriends && friendsList.length === 0 && <div className="no-friends-note">Dodaj znajomych, aby ich tu wybrać.</div>}
                                    </>)}

                                    <label>Wynik <span style={{fontWeight:400,color:'#aaa'}}>(np. 6:3)</span></label>
                                    <input type="text" placeholder="np. 6:3" value={playedScore} onChange={e => setPlayedScore(e.target.value)} />

                                    <label>Rezultat</label>
                                    <select value={playedResult} onChange={e => setPlayedResult(e.target.value)}>
                                        <option value="">— nie podawaj —</option>
                                        <option value="W">🏆 Wygrana</option>
                                        <option value="L">❌ Przegrana</option>
                                        <option value="D">🤝 Remis</option>
                                    </select>

                                    <button className="btn-add-small" onClick={addPlayedEntry} disabled={saving}>
                                        {saving ? 'Zapisywanie...' : '✔ Zapisz grę'}
                                    </button>
                                </div>
                            )}

                            {allEntries.length === 0 && !showAddPlayed && (
                                <div className="section-empty">Brak wpisów — dodaj gdzie ostatnio grałeś!</div>
                            )}
                            {allEntries.map(({ e, i, own }) => renderEntry(e, i, own))}
                        </div>
                    )}

                    {profileTab === 'edit' && (
                        <div className="profile-card">
                            <h4><i className="fas fa-pen" style={{color:'var(--primary)',marginRight:6}}></i> Edytuj profil</h4>
                            <div className="form-group">
                                <label>Imię wyświetlane</label>
                                <input type="text" value={editName} onChange={e => setEditName(e.target.value)} />
                            </div>
                            <button className="btn-apply" style={{marginTop:0}} onClick={saveEditName} disabled={editSaving}>{editSaving ? 'Zapisywanie...' : 'Zapisz zmiany'}</button>
                            {editMsg && <div className={editMsg.startsWith('✅') ? 'auth-success' : 'auth-error'} style={{marginTop:10}}>{editMsg}</div>}
                        </div>
                    )}

                    <button className="btn-logout" onClick={handleLogout}><i className="fas fa-sign-out-alt"></i> Wyloguj się</button>
                </div>
            </div>
        );
    }

    /* ─────────────────────────── FAVOURITES ────────────────────────── */
    function FavouritesScreen({ user, favourites, onToggleFav }) {
        const favItems = DATA.filter(item => favourites.includes(item.id));
        if (!user) {
            return (
                <div className="lock-banner" style={{marginTop:20}}>
                    <i className="fas fa-lock"></i>
                    <p>Ta sekcja jest dostępna tylko dla zalogowanych użytkowników.</p>
                    <button className="btn-apply" style={{marginTop:0}} onClick={() => window.__setView('auth')}>Zaloguj się</button>
                </div>
            );
        }
        return (
            <div className="container">
                <h4>Moje ulubione ({favItems.length})</h4>
                {favItems.length === 0
                    ? <div style={{background:'white',borderRadius:12,padding:20,textAlign:'center',color:'#aaa',boxShadow:'0 4px 10px rgba(0,0,0,0.08)'}}>Brak ulubionych</div>
                    : favItems.map(item => (
                        <div key={item.id} className="fav-card">
                            <img src={item.img} alt={item.name} />
                            <div className="fav-card-info"><h5>{item.name}</h5><span>{item.surface} · {item.courts} kortów</span></div>
                            <button className="btn-fav-remove" onClick={() => onToggleFav(item.id)}><i className="fas fa-heart" style={{color:'#e74c3c'}}></i></button>
                        </div>
                    ))
                }
            </div>
        );
    }

    /* ─────────────────────────── FRIENDS ───────────────────────────── */
    function FriendsScreen({ user }) {
        const fb = window.__firebase;
        const [subTab, setSubTab] = useState('friends');
        const [searchQuery, setSearchQuery] = useState('');
        const [searchResults, setSearchResults] = useState([]);
        const [searching, setSearching] = useState(false);
        const [searchError, setSearchError] = useState('');
        const [friends, setFriends] = useState([]);
        const [friendsData, setFriendsData] = useState([]);
        const [loadingFriends, setLoadingFriends] = useState(true);

        useEffect(() => {
            if (!user) return;
            fb.getDoc(fb.doc(fb.db, 'users', user.uid)).then(snap => {
                const friendUids = snap.exists() ? (snap.data().friends || []) : [];
                setFriends(friendUids);
                if (friendUids.length === 0) { setLoadingFriends(false); return; }
                Promise.all(friendUids.map(uid => fb.getDoc(fb.doc(fb.db, 'users', uid))))
                    .then(snaps => {
                        setFriendsData(snaps.filter(s => s.exists()).map(s => ({ uid: s.id, ...s.data() })));
                        setLoadingFriends(false);
                    });
            });
        }, [user?.uid]);

        const handleSearch = async () => {
            setSearchError('');
            if (searchQuery.trim().length < 2) return setSearchError('Wpisz min. 2 znaki.');
            setSearching(true);
            try {
                const snap = await fb.getDocs(fb.collection(fb.db, 'users'));
                const term = searchQuery.trim().toLowerCase();
                const results = snap.docs.map(d => ({ uid: d.id, ...d.data() }))
                    .filter(u => u.uid !== user.uid && ((u.name||'').toLowerCase().includes(term) || (u.email||'').toLowerCase().includes(term)));
                setSearchResults(results);
                if (results.length === 0) setSearchError('Nie znaleziono użytkownika.');
            } catch(e) { setSearchError('Błąd wyszukiwania.'); }
            setSearching(false);
        };

        const addFriend = async (friendUid) => {
            const newFriends = [...friends, friendUid];
            setFriends(newFriends);
            await fb.setDoc(fb.doc(fb.db, 'users', user.uid), { friends: newFriends }, { merge: true });
            const snap = await fb.getDoc(fb.doc(fb.db, 'users', friendUid));
            if (snap.exists()) setFriendsData(prev => [...prev, { uid: snap.id, ...snap.data() }]);
        };

        const removeFriend = async (friendUid) => {
            const newFriends = friends.filter(id => id !== friendUid);
            setFriends(newFriends);
            setFriendsData(prev => prev.filter(f => f.uid !== friendUid));
            await fb.setDoc(fb.doc(fb.db, 'users', user.uid), { friends: newFriends }, { merge: true });
        };

        if (!user) return <div className="lock-banner"><i className="fas fa-lock"></i><p>Zaloguj się aby zobaczyć znajomych</p></div>;

        return (
            <div className="container">
                <div className="tabs-mini">
                    <button className={`tab-mini ${subTab==='friends'?'active':''}`} onClick={() => setSubTab('friends')}>Znajomi ({friends.length})</button>
                    <button className={`tab-mini ${subTab==='search'?'active':''}`} onClick={() => setSubTab('search')}>Szukaj</button>
                </div>
                {subTab === 'search' && (
                    <div>
                        <div className="friends-search-bar">
                            <input type="text" placeholder="Imię lub email..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                            <button className="btn-search" onClick={handleSearch} disabled={searching}>{searching ? '...' : 'Szukaj'}</button>
                        </div>
                        {searchError && <div className="section-empty">{searchError}</div>}
                        {searchResults.map(result => (
                            <div key={result.uid} className="search-result-card">
                                <div className="friend-card-header">
                                    <div className="friend-avatar">{(result.name||'?').charAt(0).toUpperCase()}</div>
                                    <div className="friend-info"><h5>{result.name}</h5><span>{result.email}</span></div>
                                    {friends.includes(result.uid) ? <button className="btn-remove-friend">✔ Dodano</button> : <button className="btn-add-friend" onClick={() => addFriend(result.uid)}>+ Dodaj</button>}
                                </div>
                            </div>
                        ))}
                    </div>
                )}
                {subTab === 'friends' && (
                    <div>
                        {loadingFriends && <div className="section-empty">Ładowanie...</div>}
                        {!loadingFriends && friendsData.length === 0 && <div className="section-empty">Nie masz jeszcze znajomych. Znajdź ich w zakładce Szukaj!</div>}
                        {friendsData.map(friend => {
                            const canSeeFav = friend.privacy?.showFavourites !== false;
                            const favItems = canSeeFav ? DATA.filter(d => (friend.favourites||[]).includes(d.id)) : [];
                            return (
                                <div key={friend.uid} className="friend-card">
                                    <div className="friend-card-header">
                                        <div className="friend-avatar">{(friend.name||'?').charAt(0).toUpperCase()}</div>
                                        <div className="friend-info"><h5>{friend.name}</h5><span>{favItems.length} ulubionych</span></div>
                                        <button className="btn-remove-friend" onClick={() => removeFriend(friend.uid)}>Usuń</button>
                                    </div>
                                    {favItems.length > 0 && <div className="friend-fav-list">{favItems.map(item => <span key={item.id} className="friend-fav-tag">🎾 {item.name}</span>)}</div>}
                                </div>
                            );
                        })}
                    </div>
                )}
            </div>
        );
    }

    /* ─────────────────────────── APP ROOT ──────────────────────────── */
    function App() {
        const [view, setView] = useState('home');
        const [leftMenu, setLeftMenu] = useState(false);
        const [filterPanel, setFilterPanel] = useState(false);
        const [filtered, setFiltered] = useState(DATA);
        const [mapItem, setMapItem] = useState(null);
        const [user, setUser] = useState(undefined);
        const [favourites, setFavourites] = useState([]);
        const [f, setF] = useState({ surface: 'all' });

        window.__setView = setView;

        useEffect(() => {
            const interval = setInterval(() => {
                if (window.__firebase) {
                    clearInterval(interval);
                    window.__firebase.onAuthStateChanged(window.__firebase.auth, u => {
                        setUser(u || null);
                        if (u) {
                            window.__firebase.getDoc(window.__firebase.doc(window.__firebase.db, 'users', u.uid))
                                .then(snap => { if (snap.exists()) setFavourites(snap.data().favourites || []); });
                        } else { setFavourites([]); }
                    });
                }
            }, 100);
        }, []);

        const toggleFav = async (itemId) => {
            if (!user) { setView('auth'); return; }
            const fb = window.__firebase;
            const isFav = favourites.includes(itemId);
            const newFavs = isFav ? favourites.filter(id => id !== itemId) : [...favourites, itemId];
            setFavourites(newFavs);
            await fb.setDoc(fb.doc(fb.db, 'users', user.uid), { favourites: newFavs }, { merge: true });
        };

        const applyFilters = () => {
            setFiltered(DATA.filter(item => f.surface === 'all' || item.surface === f.surface));
            setFilterPanel(false);
        };

        const initials = user?.displayName?.charAt(0).toUpperCase() || user?.email?.charAt(0).toUpperCase() || null;

        return (
            <div>
                <div className={`overlay ${(leftMenu||filterPanel)?'show':''}`} onClick={() => { setLeftMenu(false); setFilterPanel(false); }}></div>
                {mapItem && <MapModal item={mapItem} onClose={() => setMapItem(null)} />}

                <div className={`side-panel panel-left ${leftMenu?'open':''}`}>
                    <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView('home'); setLeftMenu(false); }}>Główna</a>
                    <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView('search'); setLeftMenu(false); }}>Szukaj</a>
                    <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView('favourites'); setLeftMenu(false); }}>Ulubione</a>
                    {user && <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView('friends'); setLeftMenu(false); }}>Znajomi</a>}
                    <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView(user ? 'profile' : 'auth'); setLeftMenu(false); }}>Konto</a>
                </div>

                <div className={`side-panel panel-right ${filterPanel?'open':''}`}>
                    <h3>Filtry</h3>
                    <div className="filter-item"><label>Nawierzchnia</label>
                        <select value={f.surface} onChange={e => setF({...f,surface:e.target.value})}>
                            <option value="all">Wszystkie</option><option value="ziemna">Ziemna</option><option value="twarda">Twarda</option><option value="dywan">Dywan</option>
                        </select>
                    </div>
                    <button className="btn-apply" onClick={applyFilters}>ZASTOSUJ</button>
                </div>

                <nav className="top-nav">
                    <div onClick={() => setLeftMenu(true)}><i className="fas fa-bars"></i></div>
                    <div style={{fontWeight:700}}>ACTIVO</div>
                    <div className="nav-user">
                        {user === undefined ? <i className="fas fa-spinner fa-spin"></i>
                            : user ? <div className="nav-avatar" onClick={() => setView('profile')}>{initials}</div>
                            : <span onClick={() => setView('auth')}>Zaloguj</span>}
                    </div>
                </nav>

                {view === 'home' && (
                    <div className="container">
                        <div className="hero-card"><h2>Znajdź swój kort 🎾</h2><p>Najlepsza wyszukiwarka w Twoim mieście.</p><button className="btn-apply" onClick={() => setView('search')}>Szukaj teraz</button></div>
                    </div>
                )}
                {view === 'search' && (
                    <div className="container">
                        <button className="btn-more" onClick={() => setFilterPanel(true)}>Filtruj</button>
                        {filtered.map(item => (
                            <div key={item.id} className="card">
                                <img src={item.img} alt={item.name} />
                                <div className="card-body">
                                    <h4>{item.name} <span className="courts-badge">{item.courts}</span></h4>
                                    <div className="card-actions">
                                        <button className="btn-map" onClick={() => setMapItem(item)}>Mapa</button>
                                        <button className="btn-heart" onClick={() => toggleFav(item.id)}>{favourites.includes(item.id) ? '❤️' : '🤍'}</button>
                                        <button className="btn-reserve" onClick={() => user ? alert('Zarezerwowano') : setView('auth')}>Rezerwuj</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                )}
                {view === 'auth' && <AuthScreen />}
                {view === 'profile' && (user ? <ProfileScreen user={user} /> : <AuthScreen />)}
                {view === 'favourites' && <FavouritesScreen user={user} favourites={favourites} onToggleFav={toggleFav} />}
                {view === 'friends' && <FriendsScreen user={user} />}

                <nav className="bottom-nav">
                    <div className={`bottom-nav-item ${view==='home'?'active':''}`} onClick={() => setView('home')}><i className="fas fa-home"></i>Główna</div>
                    <div className={`bottom-nav-item ${view==='search'?'active':''}`} onClick={() => setView('search')}><i className="fas fa-search"></i>Szukaj</div>
                    <div className={`bottom-nav-item ${view==='favourites'?'active':''}`} onClick={() => setView('favourites')}><i className="fas fa-heart"></i>Ulubione</div>
                    <div className={`bottom-nav-item ${view==='auth'||view==='profile'?'active':''}`} onClick={() => setView(user ? 'profile' : 'auth')}><i className="fas fa-user"></i>Konto</div>
                </nav>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
