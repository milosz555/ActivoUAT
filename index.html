    function BarChart({ data }) {

                    {error&&<div className="auth-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}
                    {success&&<div className="auth-success"><i className="fas fa-check-circle"></i> {success}</div>}
                    <button className={`btn-apply ${loading?'btn-loading':''}`} onClick={tab==='login'?handleLogin:handleRegister}>{loading?'Proszę czekać...':tab==='login'?'Zaloguj się':'Zarejestruj się'}</button>
                </div>
            </div>
        );
    }

    /* ─── MAP MODAL ─── */
    function MapModal({ item, onClose }) {
        const mapRef=useRef(null); const mi=useRef(null);
        useEffect(()=>{if(!mapRef.current||mi.current)return;const map=L.map(mapRef.current).setView([item.lat,item.lng],15);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(map);L.marker([item.lat,item.lng],{icon:L.divIcon({html:`<div style="background:#0b3d91;color:white;padding:5px 10px;border-radius:20px;font-family:Poppins;font-weight:700;font-size:12px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3)">🎾 ${item.name}</div>`,className:'',iconAnchor:[0,0]})}).addTo(map);mi.current=map;return()=>{map.remove();mi.current=null;};},[item]);
        return(<div className="map-modal" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="map-modal-content"><div className="map-modal-header"><h3>{item.name}</h3><button className="btn-close" onClick={onClose}>✕</button></div><div id="map-container" ref={mapRef}></div><div className="map-info-row"><i className="fas fa-map-marker-alt"></i>{item.address}</div><div className="map-info-row"><i className="fas fa-layer-group"></i>Nawierzchnia: {item.surface}</div><button className="btn-apply" style={{marginTop:10}} onClick={()=>window.open(`http://maps.google.com/?q=${item.lat},${item.lng}`,'_blank')}><i className="fas fa-external-link-alt"></i> Otwórz w Google Maps</button></div></div>);
    }

    /* ─── PROFILE SCREEN ─── */
    function ProfileScreen({ user }) {
        const fb = window.__firebase;
        const [profileTab, setProfileTab] = useState('activity'); // 'activity' | 'settings'
        const [playedList, setPlayedList] = useState([]);
        const [sharedGames, setSharedGames] = useState([]);
        const [showAddForm, setShowAddForm] = useState(false);
        const [showStats, setShowStats] = useState(false);
        const [editEntry, setEditEntry] = useState(null);
        const [chartMode, setChartMode] = useState('month'); // 'month' | 'week'

        // add form
        const [court, setCourt] = useState(DATA[0].name);
        const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
        const [sport, setSport] = useState('tenis');
        const [oppUid, setOppUid] = useState('');
        const [padelOpps, setPadelOpps] = useState(['','','']);
        const [score, setScore] = useState('');
        const [result, setResult] = useState('');
        const [saving, setSaving] = useState(false);

        const [friendsList, setFriendsList] = useState([]);
        const [editName, setEditName] = useState(user.displayName||'');
        const [editSaving, setEditSaving] = useState(false);
        const [editMsg, setEditMsg] = useState('');
        const [showFav, setShowFav] = useState(true);
        const [showHistory, setShowHistory] = useState(true);

        const uRef = fb.doc(fb.db,'users',user.uid);

        useEffect(()=>{
            fb.getDoc(uRef).then(snap=>{
                if(!snap.exists()) return;
                const d=snap.data();
                setPlayedList(d.playedHistory||[]);
                setSharedGames(d.sharedGames||[]);
                if(d.privacy){setShowFav(d.privacy.showFavourites!==false);setShowHistory(d.privacy.showHistory!==false);}
                const uids=d.friends||[];
                if(uids.length){Promise.all(uids.map(uid=>fb.getDoc(fb.doc(fb.db,'users',uid)))).then(snaps=>setFriendsList(snaps.filter(s=>s.exists()).map(s=>({uid:s.id,name:s.data().name||s.data().email||s.id}))));}
            });
        },[user.uid]);

        const setPO=(i,v)=>{const c=[...padelOpps];c[i]=v;setPadelOpps(c);};

        const allEntries = useMemo(()=>[
            ...playedList.map((e,i)=>({e,i,own:true})),
            ...sharedGames.map((e,i)=>({e,i,own:false})),
        ].sort((a,b)=>new Date(b.e.date)-new Date(a.e.date)),[playedList,sharedGames]);

        /* Chart data */
        const chartData = useMemo(()=>{
            const now = new Date();
            if(chartMode==='month'){
                return Array.from({length:6},(_,i)=>{
                    const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1);
                    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                    const g=allEntries.filter(x=>x.e.date&&x.e.date.startsWith(key));
                    return {label:PL_MONTHS[d.getMonth()],tenis:g.filter(x=>x.e.sport==='tenis').length,padel:g.filter(x=>x.e.sport==='padel').length};
                });
            } else {
                // last 8 weeks
                return Array.from({length:8},(_,i)=>{
                    const d=new Date(now); d.setDate(d.getDate()-7*(7-i));
                    const wk=getWeekKey(d.toISOString().split('T')[0]);
                    const wkEnd=new Date(wk); wkEnd.setDate(wkEnd.getDate()+6);
                    const g=allEntries.filter(x=>{if(!x.e.date)return false; const xd=new Date(x.e.date); return xd>=new Date(wk)&&xd<=wkEnd;});
                    return {label:weekLabel(wk),tenis:g.filter(x=>x.e.sport==='tenis').length,padel:g.filter(x=>x.e.sport==='padel').length};
                });
            }
        },[allEntries,chartMode]);

        /* Stats summary */
        const totalGames = allEntries.length;
        const thisMonthKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
        const thisMonth = allEntries.filter(x=>x.e.date&&x.e.date.startsWith(thisMonthKey)).length;
        const wins = allEntries.filter(x=>x.e.result==='W').length;

        /* Save new */
        const addEntry = async()=>{
            setSaving(true);
            const gameId=`game_${Date.now()}_${user.uid}`;
            let oName='',pNames=[],pUids=[];
            if(sport==='tenis'){oName=oppUid?(friendsList.find(f=>f.uid===oppUid)?.name||''):'';}
            else{pUids=padelOpps.filter(Boolean);pNames=pUids.map(uid=>friendsList.find(f=>f.uid===uid)?.name||uid);}
            const entry={gameId,ownerUid:user.uid,court,date,sport,addedAt:new Date().toISOString(),
                ...(sport==='tenis'?(oName?{opponent:oName,opponentUid:oppUid}:{}):{padelOpponents:pNames,padelOpponentUids:pUids}),
                ...(score.trim()&&{score:score.trim()}), ...(result&&{result})};
            const newList=[entry,...playedList].slice(0,50);
            await fb.setDoc(uRef,{playedHistory:newList},{merge:true});
            setPlayedList(newList);
            const participantUids=sport==='tenis'?(oppUid?[oppUid]:[]):pUids;
            const ownerName=user.displayName||user.email||'Ktoś';
            for(const uid of participantUids){const pRef=fb.doc(fb.db,'users',uid);const pSnap=await fb.getDoc(pRef);if(pSnap.exists()){const ex=pSnap.data().sharedGames||[];await fb.setDoc(pRef,{sharedGames:[{...entry,sharedWith:uid,ownerName},...ex].slice(0,50)},{merge:true});}}
            setShowAddForm(false);setOppUid('');setPadelOpps(['','','']);setScore('');setResult('');setSport('tenis');setSaving(false);
        };

        /* Save edited own */
        const saveEditedOwn=async(upd)=>{
            const newList=playedList.map((e,i)=>i===editEntry.idx?upd:e);
            await fb.setDoc(uRef,{playedHistory:newList},{merge:true});setPlayedList(newList);
            const pUids=upd.padelOpponentUids?upd.padelOpponentUids:upd.opponentUid?[upd.opponentUid]:[];
            for(const uid of pUids){const pRef=fb.doc(fb.db,'users',uid);const pSnap=await fb.getDoc(pRef);if(pSnap.exists()){const ex=pSnap.data().sharedGames||[];await fb.setDoc(pRef,{sharedGames:ex.map(e=>e.gameId===upd.gameId?{...upd,sharedWith:uid,ownerName:user.displayName||user.email}:e)},{merge:true});}}
            setEditEntry(null);
        };
        const saveEditedShared=async(upd)=>{const nl=sharedGames.map((e,i)=>i===editEntry.idx?upd:e);await fb.setDoc(uRef,{sharedGames:nl},{merge:true});setSharedGames(nl);setEditEntry(null);};
        const deleteOwn=async()=>{const nl=playedList.filter((_,i)=>i!==editEntry.idx);await fb.setDoc(uRef,{playedHistory:nl},{merge:true});setPlayedList(nl);setEditEntry(null);};

        const handleLogout=async()=>{await fb.signOut(fb.auth);};
        const saveEditName=async()=>{if(!editName.trim())return setEditMsg('Imię nie może być puste.');setEditSaving(true);try{await fb.updateProfile(fb.auth.currentUser,{displayName:editName.trim()});await fb.setDoc(uRef,{name:editName.trim()},{merge:true});setEditMsg('✅ Zaktualizowano!');}catch(e){setEditMsg('Błąd zapisu.');}setEditSaving(false);};
        const savePrivacy=async(k,v)=>{await fb.setDoc(uRef,{privacy:{showFavourites:showFav,showHistory,[k]:v}},{merge:true});};
        const togglePrivacy=(k,v)=>{if(k==='showFavourites')setShowFav(v);if(k==='showHistory')setShowHistory(v);savePrivacy(k,v);};

        const initials=(user.displayName||user.email||'U').charAt(0).toUpperCase();
        const joinDate=user.metadata?.creationTime?new Date(user.metadata.creationTime).toLocaleDateString('pl-PL',{year:'numeric',month:'long'}):'—';

        const renderEntry=(entry,idx,isOwner)=>{
            const players=getAllPlayers(entry);
            return(
                <div key={`${isOwner?'o':'s'}-${idx}`} className="activity-entry">
                    <div className="activity-entry-top">
                        <div className="activity-entry-left">
                            <div className="activity-title">
                                <span className={`sport-badge sport-${entry.sport||'tenis'}`}>{SPORT_EMOJI[entry.sport||'tenis']} {SPORT_LABEL[entry.sport||'tenis']}</span>
                                <span>{entry.court}</span>
                                {entry.result&&<span className={`result-badge result-${entry.result}`}>{RESULT_LABEL[entry.result]}</span>}
                                {!isOwner&&<span className="shared-badge"><i className="fas fa-share-alt"></i> {entry.ownerName}</span>}
                            </div>
                            <div className="activity-date">{new Date(entry.date).toLocaleDateString('pl-PL',{day:'numeric',month:'short',year:'numeric'})}</div>
                            {(players.length>0||entry.score)&&(
                                <div className="activity-details">
                                    {players.length>0&&<span><i className="fas fa-users"></i>{players.join(', ')}</span>}
                                    {entry.score&&<span><i className="fas fa-table-tennis"></i>{entry.score}</span>}
                                </div>
                            )}
                        </div>
                        <button className="btn-edit-entry" onClick={()=>setEditEntry({entry,idx,isOwner})}><i className="fas fa-pen"></i></button>
                    </div>
                </div>
            );
        };

        return (
            <div>
                {editEntry&&<EditSheet entry={editEntry.entry} isOwner={editEntry.isOwner} friendsList={friendsList} onSave={editEntry.isOwner?saveEditedOwn:saveEditedShared} onDelete={deleteOwn} onClose={()=>setEditEntry(null)}/>}
                {showStats&&<StatsSheet allEntries={allEntries} onClose={()=>setShowStats(false)}/>}

                {/* Header */}
                <div className="profile-header">
                    <div className="profile-avatar-big">{initials}</div>
                    <div className="profile-name">{user.displayName||'Użytkownik'}</div>
                    <div className="profile-email">{user.email}</div>
                    <button className="btn-edit-profile" onClick={()=>setProfileTab('settings')}><i className="fas fa-pen"></i> Edytuj profil</button>
                </div>

                {/* Tabs */}
                <div className="profile-tabs">
                    <button className={`profile-tab ${profileTab==='activity'?'active':''}`} onClick={()=>setProfileTab('activity')}>
                        <i className="fas fa-bolt"></i>Aktywności
                    </button>
                    <button className={`profile-tab ${profileTab==='info'?'active':''}`} onClick={()=>setProfileTab('info')}>
                        <i className="fas fa-user"></i>Profil
                    </button>
                    <button className={`profile-tab ${profileTab==='settings'?'active':''}`} onClick={()=>setProfileTab('settings')}>
                        <i className="fas fa-cog"></i>Ustawienia
                    </button>
                </div>

                <div className="profile-body">

                    {/* ── ACTIVITY TAB ── */}
                    {profileTab==='activity' && (
                        <>
                            {/* Quick stats */}
                            <div className="stats-row">
                                <div className="stat-box"><div className="stat-num">{totalGames}</div><div className="stat-lbl">Wszystkich</div></div>
                                <div className="stat-box"><div className="stat-num">{thisMonth}</div><div className="stat-lbl">Ten miesiąc</div></div>
                                <div className="stat-box"><div className="stat-num" style={{color:'#27ae60'}}>{wins}</div><div className="stat-lbl">Wygranych</div></div>
                            </div>

                            {/* Chart card */}
                            <div className="profile-card">
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                                    <h4 style={{margin:0}}><i className="fas fa-chart-bar" style={{color:'var(--primary)'}}></i> Aktywność</h4>
                                </div>
                                <div className="chart-toggle">
                                    <button className={`chart-toggle-btn ${chartMode==='month'?'active':''}`} onClick={()=>setChartMode('month')}>Miesiącami</button>
                                    <button className={`chart-toggle-btn ${chartMode==='week'?'active':''}`} onClick={()=>setChartMode('week')}>Tygodniami</button>
                                </div>
                                <BarChart data={chartData}/>
                            </div>

                            {/* Stats detail link */}
                            <button className="btn-stats-detail" onClick={()=>setShowStats(true)}>
                                <span><i className="fas fa-chart-pie" style={{marginRight:8,color:'var(--primary)'}}></i>Szczegółowe statystyki</span>
                                <i className="fas fa-chevron-right"></i>
                            </button>

                            {/* Activity list */}
                            <div className="profile-card">
                                <h4 style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom: showAddForm?12:0}}>
                                    <span><i className="fas fa-bolt" style={{color:'var(--primary)'}}></i> Moje aktywności</span>
                                    <button style={{background:'var(--dark)',color:'white',border:'none',padding:'5px 12px',borderRadius:8,fontFamily:'Poppins',fontSize:'0.8em',fontWeight:700,cursor:'pointer'}} onClick={()=>setShowAddForm(!showAddForm)}>
                                        <i className="fas fa-plus"></i> Dodaj
                                    </button>
                                </h4>

                                {showAddForm&&(
                                    <div className="add-form">
                                        <label>Dyscyplina *</label>
                                        <div className="sport-selector">
                                            <button type="button" className={`sport-option ${sport==='tenis'?'sel-tenis':''}`} onClick={()=>setSport('tenis')}>🎾 Tenis</button>
                                            <button type="button" className={`sport-option ${sport==='padel'?'sel-padel':''}`} onClick={()=>setSport('padel')}>🏓 Padel</button>
                                        </div>
                                        <label>Obiekt *</label>
                                        <select value={court} onChange={e=>setCourt(e.target.value)}>{DATA.map(d=><option key={d.id} value={d.name}>{d.name}</option>)}</select>
                                        <label>Data *</label>
                                        <input type="date" value={date} onChange={e=>setDate(e.target.value)}/>
                                        {sport==='tenis'&&<>
                                            <label>Z kim grałem? <span style={{fontWeight:400,color:'#aaa'}}>(opcjonalnie)</span></label>
                                            <div className="opp-wrap"><select value={oppUid} onChange={e=>setOppUid(e.target.value)}><option value="">— nie wybrano —</option>{friendsList.map(f=><option key={f.uid} value={f.uid}>{f.name}</option>)}</select></div>
                                            {friendsList.length===0&&<div className="no-friends-note">Dodaj znajomych, aby ich wybrać.</div>}
                                        </>}
                                        {sport==='padel'&&<>
                                            <label>Gracze (do 3) <span style={{fontWeight:400,color:'#aaa'}}>(opcjonalnie)</span></label>
                                            {[0,1,2].map(i=>{const oth=padelOpps.filter((_,j)=>j!==i).filter(Boolean);return(<div key={i} className="opp-wrap" style={{marginBottom:i<2?6:0}}><select value={padelOpps[i]} onChange={e=>setPO(i,e.target.value)}><option value="">— Gracz {i+1} —</option>{friendsList.filter(f=>!oth.includes(f.uid)).map(f=><option key={f.uid} value={f.uid}>{f.name}</option>)}</select></div>);})}
                                            {friendsList.length===0&&<div className="no-friends-note">Dodaj znajomych, aby ich wybrać.</div>}
                                        </>}
                                        <label>Wynik <span style={{fontWeight:400,color:'#aaa'}}>(np. 6:3)</span></label>
                                        <input type="text" placeholder="np. 6:3" value={score} onChange={e=>setScore(e.target.value)}/>
                                        <label>Rezultat</label>
                                        <select value={result} onChange={e=>setResult(e.target.value)}>
                                            <option value="">— nie podawaj —</option>
                                            <option value="W">🏆 Wygrana</option>
                                            <option value="L">❌ Przegrana</option>
                                            <option value="D">🤝 Remis</option>
                                        </select>
                                        <button className="btn-save-form" onClick={addEntry} disabled={saving}>{saving?'Zapisywanie...':'✔ Zapisz aktywność'}</button>
                                    </div>
                                )}

                                {allEntries.length===0&&!showAddForm&&<div className="section-empty">Brak aktywności — dodaj swoją pierwszą grę!</div>}
                                {allEntries.map(({e,i,own})=>renderEntry(e,i,own))}
                            </div>
                        </>
                    )}

                    {/* ── INFO TAB ── */}
                    {profileTab==='info'&&(
                        <div className="profile-card">
                            <h4><i className="fas fa-user" style={{color:'var(--primary)'}}></i> Dane konta</h4>
                            <div className="profile-row"><span>Imię</span><span>{user.displayName||'—'}</span></div>
                            <div className="profile-row"><span>E-mail</span><span style={{fontSize:'0.9em'}}>{user.email}</span></div>
                            <div className="profile-row"><span>Konto od</span><span>{joinDate}</span></div>
                            <div className="profile-row"><span>Aktywności</span><span>{totalGames}</span></div>
                            <div className="profile-row"><span>Status</span><span style={{color:'var(--primary)'}}>✔ Aktywny</span></div>
                        </div>
                    )}

                    {/* ── SETTINGS TAB ── */}
                    {profileTab==='settings'&&(<>
                        <div className="profile-card">
                            <h4><i className="fas fa-pen" style={{color:'var(--primary)'}}></i> Edytuj profil</h4>
                            <div className="form-group" style={{marginBottom:0}}>
                                <label style={{fontSize:'0.8em',fontWeight:600,color:'#555',marginBottom:5,display:'block'}}>Imię wyświetlane</label>
                                <input type="text" value={editName} onChange={e=>setEditName(e.target.value)}/>
                            </div>
                            <button className="btn-apply" style={{marginTop:12,padding:12}} onClick={saveEditName} disabled={editSaving}>{editSaving?'Zapisywanie...':'Zapisz zmiany'}</button>
                            {editMsg&&<div className={editMsg.startsWith('✅')?'auth-success':'auth-error'} style={{marginTop:8}}>{editMsg}</div>}
                        </div>
                        <div className="profile-card">
                            <h4><i className="fas fa-shield-alt" style={{color:'var(--primary)'}}></i> Prywatność</h4>
                            <div className="privacy-row">
                                <div className="privacy-label">Ulubione obiekty<small>Znajomi widzą Twoje polubione korty</small></div>
                                <label className="toggle-wrap"><input type="checkbox" checked={showFav} onChange={e=>togglePrivacy('showFavourites',e.target.checked)}/><span className="toggle-slider"></span></label>
                            </div>
                            <div className="privacy-row">
                                <div className="privacy-label">Historia aktywności<small>Znajomi widzą gdzie ostatnio grałeś</small></div>
                                <label className="toggle-wrap"><input type="checkbox" checked={showHistory} onChange={e=>togglePrivacy('showHistory',e.target.checked)}/><span className="toggle-slider"></span></label>
                            </div>
                        </div>
                    </>)}

                    <button className="btn-logout" onClick={handleLogout}><i className="fas fa-sign-out-alt"></i> Wyloguj się</button>
                </div>
            </div>
        );
    }

    /* ─── FAVOURITES ─── */
    function FavouritesScreen({ user, favourites, onToggleFav }) {
        const favItems=DATA.filter(item=>favourites.includes(item.id));
        if(!user)return(<div className="lock-banner" style={{marginTop:20}}><i className="fas fa-lock"></i><p>Ta sekcja jest dostępna tylko dla zalogowanych.</p><button className="btn-apply" style={{marginTop:0}} onClick={()=>window.__setView('auth')}>Zaloguj się</button></div>);
        return(<div className="container"><h4>Moje ulubione ({favItems.length})</h4>{favItems.length===0?<div style={{background:'white',borderRadius:12,padding:20,textAlign:'center',color:'#aaa'}}>Brak ulubionych</div>:favItems.map(item=>(<div key={item.id} className="fav-card"><img src={item.img} alt={item.name}/><div className="fav-card-info"><h5>{item.name}</h5><span>{item.surface} · {item.courts} kortów</span></div><button className="btn-fav-remove" onClick={()=>onToggleFav(item.id)}><i className="fas fa-heart" style={{color:'var(--danger)'}}></i></button></div>))}</div>);
    }

    /* ─── FRIENDS ─── */
    function FriendsScreen({ user }) {
        const fb=window.__firebase;
        const [subTab,setSubTab]=useState('friends');
        const [sq,setSq]=useState(''); const [results,setResults]=useState([]); const [searching,setSearching]=useState(false); const [sErr,setSErr]=useState('');
        const [friends,setFriends]=useState([]); const [friendsData,setFriendsData]=useState([]); const [loading,setLoading]=useState(true);
        useEffect(()=>{if(!user)return;fb.getDoc(fb.doc(fb.db,'users',user.uid)).then(snap=>{const uids=snap.exists()?(snap.data().friends||[]):[];setFriends(uids);if(!uids.length){setLoading(false);return;}Promise.all(uids.map(uid=>fb.getDoc(fb.doc(fb.db,'users',uid)))).then(snaps=>{setFriendsData(snaps.filter(s=>s.exists()).map(s=>({uid:s.id,...s.data()})));setLoading(false);});});},[user?.uid]);
        const search=async()=>{setSErr('');if(sq.trim().length<2)return setSErr('Wpisz min. 2 znaki.');setSearching(true);try{const snap=await fb.getDocs(fb.collection(fb.db,'users'));const t=sq.trim().toLowerCase();const r=snap.docs.map(d=>({uid:d.id,...d.data()})).filter(u=>u.uid!==user.uid&&((u.name||'').toLowerCase().includes(t)||(u.email||'').toLowerCase().includes(t)));setResults(r);if(!r.length)setSErr('Nie znaleziono.');}catch(e){setSErr('Błąd wyszukiwania.');}setSearching(false);};
        const addFriend=async(uid)=>{const nf=[...friends,uid];setFriends(nf);await fb.setDoc(fb.doc(fb.db,'users',user.uid),{friends:nf},{merge:true});const s=await fb.getDoc(fb.doc(fb.db,'users',uid));if(s.exists())setFriendsData(p=>[...p,{uid:s.id,...s.data()}]);};
        const removeFriend=async(uid)=>{const nf=friends.filter(id=>id!==uid);setFriends(nf);setFriendsData(p=>p.filter(f=>f.uid!==uid));await fb.setDoc(fb.doc(fb.db,'users',user.uid),{friends:nf},{merge:true});};
        if(!user)return<div className="lock-banner"><i className="fas fa-lock"></i><p>Zaloguj się aby zobaczyć znajomych</p></div>;
        return(<div className="container">
            <div className="tabs-mini"><button className={`tab-mini ${subTab==='friends'?'active':''}`} onClick={()=>setSubTab('friends')}>Znajomi ({friends.length})</button><button className={`tab-mini ${subTab==='search'?'active':''}`} onClick={()=>setSubTab('search')}>Szukaj</button></div>
            {subTab==='search'&&(<div><div className="friends-search-bar"><input type="text" placeholder="Imię lub email..." value={sq} onChange={e=>setSq(e.target.value)}/><button className="btn-search" onClick={search} disabled={searching}>{searching?'...':'Szukaj'}</button></div>{sErr&&<div className="section-empty">{sErr}</div>}{results.map(r=>(<div key={r.uid} className="search-result-card"><div className="friend-card-header"><div className="friend-avatar">{(r.name||'?').charAt(0).toUpperCase()}</div><div className="friend-info"><h5>{r.name}</h5><span>{r.email}</span></div>{friends.includes(r.uid)?<button className="btn-remove-friend">✔ Dodano</button>:<button className="btn-add-friend" onClick={()=>addFriend(r.uid)}>+ Dodaj</button>}</div></div>))}</div>)}
            {subTab==='friends'&&(<div>{loading&&<div className="section-empty">Ładowanie...</div>}{!loading&&!friendsData.length&&<div className="section-empty">Brak znajomych. Znajdź ich w zakładce Szukaj!</div>}{friendsData.map(f=>{const favI=f.privacy?.showFavourites!==false?DATA.filter(d=>(f.favourites||[]).includes(d.id)):[];return(<div key={f.uid} className="friend-card"><div className="friend-card-header"><div className="friend-avatar">{(f.name||'?').charAt(0).toUpperCase()}</div><div className="friend-info"><h5>{f.name}</h5><span>{favI.length} ulubionych</span></div><button className="btn-remove-friend" onClick={()=>removeFriend(f.uid)}>Usuń</button></div>{favI.length>0&&<div className="friend-fav-list" style={{marginTop:8}}>{favI.map(it=><span key={it.id} className="friend-fav-tag">🎾 {it.name}</span>)}</div>}</div>);})}</div>)}
        </div>);
    }

    /* ─── APP ─── */
    function App() {
        const [view,setView]=useState('home');
        const [leftMenu,setLeftMenu]=useState(false);
        const [filterPanel,setFilterPanel]=useState(false);
        const [filtered,setFiltered]=useState(DATA);
        const [mapItem,setMapItem]=useState(null);
        const [user,setUser]=useState(undefined);
        const [favourites,setFavourites]=useState([]);
        const [surf,setSurf]=useState('all');
        window.__setView=setView;

        useEffect(()=>{const iv=setInterval(()=>{if(window.__firebase){clearInterval(iv);window.__firebase.onAuthStateChanged(window.__firebase.auth,u=>{setUser(u||null);if(u){window.__firebase.getDoc(window.__firebase.doc(window.__firebase.db,'users',u.uid)).then(s=>{if(s.exists())setFavourites(s.data().favourites||[]);});}else setFavourites([]);});}},100);},[]);

        const toggleFav=async(id)=>{if(!user){setView('auth');return;}const fb=window.__firebase;const nf=favourites.includes(id)?favourites.filter(x=>x!==id):[...favourites,id];setFavourites(nf);await fb.setDoc(fb.doc(fb.db,'users',user.uid),{favourites:nf},{merge:true});};
        const applyFilters=()=>{setFiltered(DATA.filter(it=>surf==='all'||it.surface===surf));setFilterPanel(false);};
        const initials=user?.displayName?.charAt(0).toUpperCase()||user?.email?.charAt(0).toUpperCase()||null;

        return(<div>
            <div className={`overlay ${(leftMenu||filterPanel)?'show':''}`} onClick={()=>{setLeftMenu(false);setFilterPanel(false);}}></div>
            {mapItem&&<MapModal item={mapItem} onClose={()=>setMapItem(null)}/>}

            <div className={`side-panel panel-left ${leftMenu?'open':''}`}>
                {['home','search','favourites',...(user?['friends']:[]),...(user?['profile']:['auth'])].map(v=>(<a key={v} href="#" style={{color:'white',display:'block',padding:'14px 0'}} onClick={()=>{setView(v);setLeftMenu(false);}}>{v==='home'?'Główna':v==='search'?'Szukaj':v==='favourites'?'Ulubione':v==='friends'?'Znajomi':'Konto'}</a>))}
            </div>

            <div className={`side-panel panel-right ${filterPanel?'open':''}`} style={{padding:'60px 20px 20px'}}>
                <h3>Filtry</h3>
                <div className="filter-item"><label>Nawierzchnia</label><select value={surf} onChange={e=>setSurf(e.target.value)}><option value="all">Wszystkie</option><option value="ziemna">Ziemna</option><option value="twarda">Twarda</option><option value="dywan">Dywan</option></select></div>
                <button className="btn-apply" onClick={applyFilters}>ZASTOSUJ</button>
            </div>

            <nav className="top-nav">
                <div onClick={()=>setLeftMenu(true)}><i className="fas fa-bars" style={{fontSize:'1.1em',cursor:'pointer'}}></i></div>
                <div style={{fontWeight:700}}>ACTIVO</div>
                <div>{user===undefined?<i className="fas fa-spinner fa-spin"></i>:user?<div className="nav-avatar" onClick={()=>setView('profile')}>{initials}</div>:<span style={{cursor:'pointer',fontSize:'0.9em'}} onClick={()=>setView('auth')}>Zaloguj</span>}</div>
            </nav>

            {view==='home'&&<div className="container"><div className="hero-card"><h2>Znajdź swój kort 🎾</h2><p>Najlepsza wyszukiwarka w Twoim mieście.</p><button className="btn-apply" onClick={()=>setView('search')}>Szukaj teraz</button></div></div>}

            {view==='search'&&<div className="container">
                <button className="btn-more" onClick={()=>setFilterPanel(true)}>Filtruj</button>
                {filtered.map(item=>(
                    <div key={item.id} className="card">
                        <img src={item.img} alt={item.name}/>
                        <div className="card-body">
                            <h4>{item.name}<span className="courts-badge">{item.courts}</span></h4>
                            <div className="card-actions">
                                <button className="btn-map" onClick={()=>setMapItem(item)}>Mapa</button>
                                <button className="btn-heart" onClick={()=>toggleFav(item.id)}>{favourites.includes(item.id)?'❤️':'🤍'}</button>
                                <button className="btn-reserve" onClick={()=>user?alert('Zarezerwowano'):setView('auth')}>Rezerwuj</button>
                            </div>
                        </div>
                    </div>
                ))}
            </div>}

            {view==='auth'&&<AuthScreen/>}
            {view==='profile'&&(user?<ProfileScreen user={user}/>:<AuthScreen/>)}
            {view==='favourites'&&<FavouritesScreen user={user} favourites={favourites} onToggleFav={toggleFav}/>}
            {view==='friends'&&<FriendsScreen user={user}/>}

            <nav className="bottom-nav">
                <div className={`bottom-nav-item ${view==='home'?'active':''}`} onClick={()=>setView('home')}><i className="fas fa-home"></i>Główna</div>
                <div className={`bottom-nav-item ${view==='search'?'active':''}`} onClick={()=>setView('search')}><i className="fas fa-search"></i>Szukaj</div>
                <div className={`bottom-nav-item ${view==='favourites'?'active':''}`} onClick={()=>setView('favourites')}><i className="fas fa-heart"></i>Ulubione</div>
                <div className={`bottom-nav-item ${(view==='profile'||view==='auth')?'active':''}`} onClick={()=>setView(user?'profile':'auth')}><i className="fas fa-user"></i>Konto</div>
            </nav>
        </div>);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
