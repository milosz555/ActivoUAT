<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Activo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg: #0d0d0f; --s1: #141418; --s2: #1c1c22; --border: #27272f;
            --accent: #b5ff4d; --accent2: #f97316; --t1: #f0f0f0; --t2: #8c8c99;
            --danger: #f43f5e; --win: #4ade80; --radius: 12px;
            --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background: var(--bg); color: var(--t1); min-height: 100vh; -webkit-text-size-adjust: 100%; }

        /* FIX: Zapobieganie przybliżaniu na iOS (font-size musi być min 16px) */
        input, select, textarea, .combobox { 
            font-size: 16px !important; 
            font-family: var(--font); background: var(--s2); color: var(--t1); 
            border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; width: 100%; 
        }

        .app-shell { display: flex; min-height: 100vh; }
        .desktop-nav { display: none; position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: var(--s1); border-right: 1px solid var(--border); padding: 28px 16px; flex-direction: column; gap: 4px; z-index: 200; }
        .desk-nav-item { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: var(--radius); font-size: 0.9em; font-weight: 500; color: var(--t2); cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
        .desk-nav-item.active { background: var(--accent); color: #0d0d0f; font-weight: 700; }
        .content-area { flex: 1; min-width: 0; }
        .top-nav { background: var(--s1); border-bottom: 1px solid var(--border); padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.1em; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--s1); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .bottom-nav-item { flex: 1; padding: 10px 5px; text-align: center; color: var(--t2); border: none; background: none; font-size: 0.6em; }
        .bottom-nav-item i { display: block; font-size: 1.5em; margin-bottom: 3px; }
        .bottom-nav-item.active { color: var(--accent); }
        .page { padding: 20px 16px 100px; max-width: 680px; margin: 0 auto; }
        .card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
        .btn-primary { background: var(--accent); color: #0d0d0f; border: none; padding: 13px; border-radius: 9px; font-weight: 700; width: 100%; cursor: pointer; }
        .field-label { display: block; font-size: 0.75em; font-weight: 600; color: var(--t2); margin: 12px 0 5px; text-transform: uppercase; }
        .sport-selector { display: flex; gap: 8px; margin-bottom: 10px; }
        .sport-opt { flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: 9px; background: var(--s1); color: var(--t2); font-weight: 600; cursor: pointer; }
        .sport-opt.sel-t { border-color: var(--accent); color: var(--accent); }
        .sport-opt.sel-p { border-color: var(--accent2); color: var(--accent2); }
        .act-entry { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 0.7em; font-weight: 700; margin-right: 5px; }
        .badge-tenis { background: rgba(181,255,77,0.1); color: var(--accent); }
        .badge-padel { background: rgba(249,115,22,0.1); color: var(--accent2); }
        .img-preview { width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid var(--border); }
        .sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; display: flex; align-items: flex-end; backdrop-filter: blur(4px); }
        .sheet { background: var(--s1); width: 100%; border-radius: 20px 20px 0 0; max-height: 90vh; overflow-y: auto; padding: 20px; }
        @media (min-width: 768px) {
            .desktop-nav { display: flex; } .top-nav, .bottom-nav { display: none; }
            .content-area { margin-left: 220px; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    const app = initializeApp({ apiKey:"AIzaSyAz01TWvm83M8OUYDevXmo1vt7q64zcbR8", authDomain:"activo-2ccb5.firebaseapp.com", projectId:"activo-2ccb5", storageBucket:"activo-2ccb5.firebasestorage.app", messagingSenderId:"158201159420", appId:"1:158201159420:web:b2fdf18e9f7741fd0f0179" });
    window.__firebase = { auth: getAuth(app), db: getFirestore(app), onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, doc, setDoc, getDoc, collection, getDocs, serverTimestamp };
</script>

<script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const DATA = [
        { id:1, name:"Park Tenisowy Olimpia", address:"ul. Warmińska 1, Poznań" },
        { id:2, name:"Posir Rataje", address:"Os. Piastowskie 106A, Poznań" },
        { id:3, name:"FairPlayce", address:"ul. Bożydara 10, Poznań" },
        { id:4, name:"Kortowo", address:"Kortowo 62, Poznań" },
        { id:5, name:"Centrum PLEK", address:"ul. Margonińska 25, Poznań" },
        { id:6, name:"InterPadel Poznań", address:"ul. Wołczyńska 18, Poznań" }
    ];

    function App() {
        const [view, setView] = useState('home');
        const [user, setUser] = useState(undefined);
        const [favs, setFavs] = useState([]);
        const fb = window.__firebase;

        useEffect(() => {
            fb.onAuthStateChanged(fb.auth, async (u) => {
                setUser(u || null);
                if (u) {
                    const s = await fb.getDoc(fb.doc(fb.db, 'users', u.uid));
                    if (s.exists()) setFavs(s.data().favourites || []);
                }
            });
        }, []);

        const navItems = [
            { v: 'home', icon: 'fa-home', label: 'Start' },
            { v: 'search', icon: 'fa-search', label: 'Szukaj' },
            { v: 'profile', icon: 'fa-bolt', label: 'Aktywność' },
            { v: 'friends', icon: 'fa-users', label: 'Znajomi' }
        ];

        return (
            <div className="app-shell">
                <nav className="desktop-nav">
                    <div className="logo" style={{padding:'0 12px 20px'}}>ACTIVO</div>
                    {navItems.map(n => (
                        <button key={n.v} className={`desk-nav-item ${view===n.v?'active':''}`} onClick={()=>setView(n.v)}>
                            <i className={`fas ${n.icon}`}></i> {n.label}
                        </button>
                    ))}
                </nav>

                <div className="content-area">
                    <nav className="top-nav"><div className="logo">ACTIVO</div></nav>
                    
                    {view === 'home' && <div className="page"><h2>Witaj w Activo 🎾</h2><p style={{color:'var(--t2)', marginTop:10}}>Twoje centrum dowodzenia na korcie.</p></div>}
                    {view === 'search' && <SearchScreen favs={favs} toggleFav={(id) => {}} />}
                    {view === 'profile' && (user ? <ProfileScreen user={user} /> : <AuthScreen />)}
                    {view === 'friends' && <FriendsScreen user={user} />}

                    <nav className="bottom-nav">
                        {navItems.map(n => (
                            <button key={n.v} className={`bottom-nav-item ${view===n.v?'active':''}`} onClick={()=>setView(n.v)}>
                                <i className={`fas ${n.icon}`}></i> {n.label}
                            </button>
                        ))}
                    </nav>
                </div>
            </div>
        );
    }

    function ProfileScreen({ user }) {
        const fb = window.__firebase;
        const [history, setHistory] = useState([]);
        const [fList, setFList] = useState([]);
        const [showAdd, setShowAdd] = useState(false);
        const [saving, setSaving] = useState(false);

        // Form state
        const [sport, setSport] = useState('tenis');
        const [court, setCourt] = useState('');
        const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
        const [oppName, setOppName] = useState('');
        const [oppUid, setOppUid] = useState('');
        const [pPlayers, setPPlayers] = useState(['', '', '']); // Name or Uid
        const [score, setScore] = useState('');
        const [imgUrl, setImgUrl] = useState('');

        useEffect(() => {
            const loadData = async () => {
                const s = await fb.getDoc(fb.doc(fb.db, 'users', user.uid));
                if (s.exists()) {
                    setHistory(s.data().playedHistory || []);
                    const fUids = s.data().friends || [];
                    const fSnaps = await Promise.all(fUids.map(id => fb.getDoc(fb.doc(fb.db, 'users', id))));
                    setFList(fSnaps.map(fs => ({ uid: fs.id, name: fs.data().name })));
                }
            };
            loadData();
        }, [user.uid]);

        const addGame = async () => {
            setSaving(true);
            const gameId = `g_${Date.now()}`;
            const newEntry = {
                gameId, sport, court, date, score, imgUrl,
                ownerUid: user.uid,
                addedAt: new Date().toISOString()
            };

            if (sport === 'tenis') {
                newEntry.opponent = oppName;
                newEntry.opponentUid = oppUid;
            } else {
                newEntry.padelPlayers = pPlayers.filter(p => p.trim() !== '');
            }

            const updatedHistory = [newEntry, ...history].slice(0, 50);
            await fb.setDoc(fb.doc(fb.db, 'users', user.uid), { playedHistory: updatedHistory }, { merge: true });
            
            // Logic for notifying friends would go here (matching by UID)
            
            setHistory(updatedHistory);
            setShowAdd(false);
            setSaving(false);
            setCourt(''); setOppName(''); setOppUid(''); setPPlayers(['','','']); setScore(''); setImgUrl('');
        };

        return (
            <div className="page">
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
                    <h3>Moja Aktywność</h3>
                    <button className="btn-primary" style={{width:'auto', padding:'8px 16px'}} onClick={()=>setShowAdd(true)}>+ Dodaj grę</button>
                </div>

                {showAdd && (
                    <div className="sheet-bg" onClick={(e)=>e.target===e.currentTarget && setShowAdd(false)}>
                        <div className="sheet">
                            <h4>Nowa rozgrywka</h4>
                            <label className="field-label">Dyscyplina</label>
                            <div className="sport-selector">
                                <button className={`sport-opt ${sport==='tenis'?'sel-t':''}`} onClick={()=>setSport('tenis')}>Tenis</button>
                                <button className={`sport-opt ${sport==='padel'?'sel-p':''}`} onClick={()=>setSport('padel')}>Padel</button>
                            </div>

                            <label className="field-label">Obiekt (wybierz lub wpisz)</label>
                            <input list="courts-list" value={court} onChange={e=>setCourt(e.target.value)} placeholder="Nazwa klubu..." />
                            <datalist id="courts-list">
                                {DATA.map(d => <option key={d.id} value={d.name} />)}
                            </datalist>

                            <label className="field-label">Data</label>
                            <input type="date" value={date} onChange={e=>setDate(e.target.value)} />

                            {sport === 'tenis' ? (
                                <>
                                    <label className="field-label">Przeciwnik</label>
                                    <input list="friends-list" value={oppName} onChange={e=>{
                                        const f = fList.find(x => x.name === e.target.value);
                                        setOppName(e.target.value);
                                        setOppUid(f ? f.uid : '');
                                    }} placeholder="Imię lub wybierz znajomego..." />
                                </>
                            ) : (
                                <>
                                    <label className="field-label">Pozostali gracze (max 3)</label>
                                    {pPlayers.map((p, i) => (
                                        <input key={i} list="friends-list" value={p} style={{marginBottom:5}}
                                            onChange={e => {
                                                const newP = [...pPlayers];
                                                newP[i] = e.target.value;
                                                setPPlayers(newP);
                                            }} placeholder={`Gracz ${i+2}...`} />
                                    ))}
                                </>
                            )}
                            <datalist id="friends-list">
                                {fList.map(f => <option key={f.uid} value={f.name} />)}
                            </datalist>

                            <label className="field-label">Wynik / Americano</label>
                            <input type="text" value={score} onChange={e=>setScore(e.target.value)} placeholder="np. 6:4, 7:5 lub 24 pkt" />

                            <label className="field-label">Link do zdjęcia (wyniki/tablica)</label>
                            <input type="text" value={imgUrl} onChange={e=>setImgUrl(e.target.value)} placeholder="https://..." />

                            <button className="btn-primary" style={{marginTop:20}} onClick={addGame} disabled={saving}>
                                {saving ? 'Zapisywanie...' : 'Zapisz aktywność'}
                            </button>
                        </div>
                    </div>
                )}

                {history.length === 0 ? <p style={{color:'var(--t2)', textAlign:'center', marginTop:40}}>Brak zapisanych gier.</p> : history.map(h => (
                    <div key={h.gameId} className="card">
                        <div style={{display:'flex', justifyContent:'space-between'}}>
                            <span className={`badge badge-${h.sport}`}>{h.sport.toUpperCase()}</span>
                            <span style={{fontSize:'0.8em', color:'var(--t2)'}}>{h.date}</span>
                        </div>
                        <div style={{marginTop:10, fontWeight:700}}>{h.court}</div>
                        <div style={{fontSize:'0.85em', color:'var(--t2)', marginTop:4}}>
                            Z: {h.sport === 'tenis' ? (h.opponent || 'Nieznajomy') : (h.padelPlayers?.join(', ') || '—')}
                        </div>
                        {h.score && <div style={{marginTop:8, color:'var(--accent)', fontFamily:'var(--mono)', fontWeight:700}}>Wynik: {h.score}</div>}
                        {h.imgUrl && <img src={h.imgUrl} className="img-preview" alt="Wynik" onError={(e)=>e.target.style.display='none'} />}
                    </div>
                ))}
            </div>
        );
    }

    function SearchScreen({ favs }) {
        return (
            <div className="page">
                <h3>Kluby w Twojej okolicy</h3>
                {DATA.map(d => (
                    <div key={d.id} className="card">
                        <div style={{fontWeight:700}}>{d.name}</div>
                        <div style={{fontSize:'0.8em', color:'var(--t2)'}}>{d.address}</div>
                    </div>
                ))}
            </div>
        );
    }

    function FriendsScreen({ user }) {
        return <div className="page"><h3>Znajomi</h3><p style={{color:'var(--t2)'}}>Funkcja zarządzania społecznością.</p></div>;
    }

    function AuthScreen() {
        return <div className="page"><h3>Zaloguj się</h3><p>Aby śledzić swoje wyniki, musisz mieć konto.</p></div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
