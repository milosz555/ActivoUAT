        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: var(--font); background: var(--bg); color: var(--t1); overflow-x: hidden; min-height: 100vh; }

    function BarChart({ data }) {
        if (!data.length) return <div className="chart-empty">Brak danych</div>;

        const BARS = hasSilownia ? 3 : 2;
        const BW=20, G=4, H=130, PL=26, PB=22, PT=14;
        const cW = BW*BARS + G*(BARS-1);
        const maxV = Math.max(1,...data.map(d=>(d.tenis||0)+(d.padel||0)+(d.silownia||0)));
        const tW = PL + data.length*(cW+10)+6;
        const toY = v => PT+(H-PB-PT)*(1-v/maxV);
        const bH = v => Math.max(2,(H-PB-PT)*(v/maxV));
        const yticks = maxV<=4?Array.from({length:maxV+1},(_,i)=>i):[0,Math.round(maxV/2),maxV];
        const uniqueY = [...new Set(yticks)];
        const COLORS = {tenis:'#b5ff4d', padel:'#f97316', silownia:'#a78bfa'};
        const sports = hasSilownia ? ['tenis','padel','silownia'] : ['tenis','padel'];
        return (
            <div>

                                    const v=d[sp]||0;
                                    const bx=x0+si*(BW+G);
                                    return v>0
                                        ?<rect key={sp} x={bx} y={toY(v)} width={BW} height={bH(v)} rx="3" fill={COLORS[sp]} fillOpacity="0.9"/>
                                        :<rect key={sp} x={bx} y={H-PB-2} width={BW} height={2} rx="1" fill="#27272f"/>;
                                })}
                                <text x={cx} y={H-4} textAnchor="middle" fontSize="9" fill="#8c8c99">{d.label}</text>
                            </g>);
                        })}
                    </svg>
                </div>
                <div style={{display:'flex',gap:14,marginTop:8,flexWrap:'wrap'}}>

        const withR=games.filter(g=>g.result).length;
        const winRate=withR?Math.round(wins/withR*100):null;

        const now=new Date();
        const perMonth=Array.from({length:6},(_,i)=>{
            const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1);
            const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

                                    <p className="readonly-note"><i className="fas fa-lock" style={{marginRight:5}}></i>Szczegóły może edytować tylko twórca gry.</p>

                            <input type="text" placeholder="np. 6:3" value={score} onChange={e=>setScore(e.target.value)}/>
                            <label className="edit-label">Rezultat</label>

                                <option value="L">❌ Przegrana</option>

    function translateError(c){const m={'auth/email-already-in-use':'Ten e-mail jest już zarejestrowany.','auth/invalid-email':'Nieprawidłowy e-mail.','auth/weak-password':'Hasło min. 6 znaków.','auth/user-not-found':'Nie znaleziono konta.','auth/wrong-password':'Złe hasło.','auth/invalid-credential':'Nieprawidłowy e-mail lub hasło.','auth/too-many-requests':'Zbyt wiele prób.'};return m[c]||'Wystąpił błąd.';}
    function AuthScreen() {
        const [tab,setTab]=useState('login');
        const [name,setName]=useState('');const [email,setEmail]=useState('');const [pwd,setPwd]=useState('');
        const [err,setErr]=useState('');const [ok,setOk]=useState('');const [loading,setLoading]=useState(false);
        const fb=window.__firebase;
        const reg=async()=>{setErr('');setOk('');if(!name.trim())return setErr('Podaj imię.');if(!email.trim())return setErr('Podaj e-mail.');if(pwd.length<6)return setErr('Hasło min. 6 znaków.');setLoading(true);try{const c=await fb.createUserWithEmailAndPassword(fb.auth,email.trim(),pwd);await fb.updateProfile(c.user,{displayName:name.trim()});await fb.setDoc(fb.doc(fb.db,'users',c.user.uid),{uid:c.user.uid,name:name.trim(),email:email.trim().toLowerCase(),createdAt:fb.serverTimestamp(),role:'user'});await fb.signOut(fb.auth);setOk('Konto utworzone! Zaloguj się.');setTab('login');setName('');setPwd('');}catch(e){setErr(translateError(e.code));}setLoading(false);};
        const login=async()=>{setErr('');setOk('');if(!email.trim())return setErr('Podaj e-mail.');if(!pwd.trim())return setErr('Podaj hasło.');setLoading(true);try{await fb.signInWithEmailAndPassword(fb.auth,email.trim().toLowerCase(),pwd);}catch(e){setErr(translateError(e.code));}setLoading(false);};
        return (
            <div className="page" style={{paddingTop:28}}>
                <div className="auth-tabs-row">
                    <button className={`auth-tab-btn ${tab==='login'?'active':''}`} onClick={()=>{setTab('login');setErr('');setOk('');}}>Logowanie</button>
                    <button className={`auth-tab-btn ${tab==='register'?'active':''}`} onClick={()=>{setTab('register');setErr('');setOk('');}}>Rejestracja</button>
                </div>
                <div className="auth-card">
                    {tab==='login'?<><h2>Witaj z powrotem 👋</h2><p className="subtitle">Zaloguj się aby korzystać z Activo.</p></>:<><h2>Utwórz konto 🎾</h2><p className="subtitle">Dołącz do Activo i śledź aktywności.</p></>}
                    {tab==='register'&&<div style={{marginBottom:14}}><label className="field-label">Imię</label><input type="text" placeholder="np. Kamil" value={name} onChange={e=>setName(e.target.value)}/></div>}
                    <div style={{marginBottom:14}}><label className="field-label">E-mail</label><input type="email" placeholder="twoj@email.pl" value={email} onChange={e=>setEmail(e.target.value)}/></div>
                    <div style={{marginBottom:4}}><label className="field-label">Hasło {tab==='register'&&<span style={{fontWeight:400,textTransform:'none'}}>(min. 6 znaków)</span>}</label><input type="password" placeholder="••••••••" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(tab==='login'?login():reg())}/></div>
                    {err&&<div className="auth-error"><i className="fas fa-exclamation-circle" style={{marginRight:6}}></i>{err}</div>}
                    {ok&&<div className="auth-success"><i className="fas fa-check-circle" style={{marginRight:6}}></i>{ok}</div>}
                    <button className="btn-primary" style={{marginTop:16}} onClick={tab==='login'?login:reg} disabled={loading}>{loading?'Proszę czekać...':tab==='login'?'Zaloguj się':'Zarejestruj się'}</button>

    /* ── PROFILE SCREEN ── */
    function ProfileScreen({ user }) {
        const fb=window.__firebase;
        const [pTab,setPTab]=useState('activity');
        const [playedList,setPlayedList]=useState([]);
        const [sharedGames,setSharedGames]=useState([]);
        const [showAdd,setShowAdd]=useState(false);
        const [showStats,setShowStats]=useState(false);
        const [editE,setEditE]=useState(null);
        const [chartMode,setChartMode]=useState('6m');
        // court: dropdown + optional custom
        const [court,setCourt]=useState(DATA[0].name);
        const [courtIsCustom,setCourtIsCustom]=useState(false);
        const [courtCustom,setCourtCustom]=useState('');
        const [date,setDate]=useState(new Date().toISOString().split('T')[0]);
        const [sport,setSport]=useState('tenis');
        // tenis opponent: from friends OR manual name
        const [oppUid,setOppUid]=useState('');
        const [oppManual,setOppManual]=useState('');
        // padel: each slot can be from friends OR manual; store {uid, manual} per slot
        const [pSlots,setPSlots]=useState([{uid:'',manual:''},{uid:'',manual:''},{uid:'',manual:''}]);
        const [score,setScore]=useState('');
        const [result,setResult]=useState('');
        const [photoUrl,setPhotoUrl]=useState('');
        const [note,setNote]=useState('');
        const [saving,setSaving]=useState(false);
        const [fList,setFList]=useState([]);
        const [eName,setEName]=useState(user.displayName||'');
        const [eSaving,setESaving]=useState(false);
        const [eMsg,setEMsg]=useState('');
        const [showFav,setShowFav]=useState(true);
        const [showHist,setShowHist]=useState(true);
        const uRef=fb.doc(fb.db,'users',user.uid);
        useEffect(()=>{fb.getDoc(uRef).then(snap=>{if(!snap.exists())return;const d=snap.data();setPlayedList(d.playedHistory||[]);setSharedGames(d.sharedGames||[]);if(d.privacy){setShowFav(d.privacy.showFavourites!==false);setShowHist(d.privacy.showHistory!==false);}const uids=d.friends||[];if(uids.length)Promise.all(uids.map(uid=>fb.getDoc(fb.doc(fb.db,'users',uid)))).then(ss=>setFList(ss.filter(s=>s.exists()).map(s=>({uid:s.id,name:s.data().name||s.data().email||s.id}))));});},[user.uid]);

        const setPS=(i,field,val)=>{const c=[...pSlots];c[i]={...c[i],[field]:val};if(field==='uid')c[i].manual='';if(field==='manual')c[i].uid='';setPSlots(c);};
        const resolvedCourt = courtIsCustom ? courtCustom.trim() : court;

        const allEntries=useMemo(()=>[...playedList.map((e,i)=>({e,i,own:true})),...sharedGames.map((e,i)=>({e,i,own:false}))].sort((a,b)=>new Date(b.e.date)-new Date(a.e.date)),[playedList,sharedGames]);
        const chartData=useMemo(()=>{
            const now=new Date();
            let months=6;
            if(chartMode==='3m')months=3;
            else if(chartMode==='6m')months=6;
            else if(chartMode==='12m')months=12;
            else if(chartMode==='all'){
                if(!allEntries.length)return[];
                const oldest=allEntries.reduce((a,b)=>new Date(a.e.date)<new Date(b.e.date)?a:b);
                const d=new Date(oldest.e.date);
                const diff=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
                months=Math.max(1,diff+1);
            }
            return Array.from({length:months},(_,i)=>{
                const d=new Date(now.getFullYear(),now.getMonth()-(months-1-i),1);
                const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                const g=allEntries.filter(x=>x.e.date&&x.e.date.startsWith(key));
                return{label:PM[d.getMonth()],tenis:g.filter(x=>x.e.sport==='tenis').length,padel:g.filter(x=>x.e.sport==='padel').length,silownia:g.filter(x=>x.e.sport==='silownia').length};
            });
        },[allEntries,chartMode]);
        const total=allEntries.length;
        const nowKey=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
        const thisMonth=allEntries.filter(x=>x.e.date&&x.e.date.startsWith(nowKey)).length;
        const wins=allEntries.filter(x=>x.e.result==='W').length;

        const addEntry=async()=>{
            setSaving(true);
            const gid=`game_${Date.now()}_${user.uid}`;
            const finalCourt = resolvedCourt || DATA[0].name;
            let oN='', oUid='', pNames=[], pUids=[];
            if(sport==='tenis'){
                if(oppUid){ oUid=oppUid; oN=fList.find(f=>f.uid===oppUid)?.name||''; }
                else if(oppManual.trim()){ oN=oppManual.trim(); }
            } else {
                pSlots.forEach(s=>{
                    if(s.uid){ pUids.push(s.uid); pNames.push(fList.find(f=>f.uid===s.uid)?.name||s.uid); }
                    else if(s.manual.trim()){ pNames.push(s.manual.trim()); }
                });
            }
            const entry={gameId:gid,ownerUid:user.uid,court:finalCourt,date,sport,addedAt:new Date().toISOString(),
                ...(sport==='tenis'?(oN?{opponent:oN,...(oUid&&{opponentUid:oUid})}:{}):{padelOpponents:pNames,padelOpponentUids:pUids}),
                ...(score.trim()&&{score:score.trim()}),
                ...(result&&{result}),
                ...(photoUrl.trim()&&{photoUrl:photoUrl.trim()}),
                ...(note.trim()&&{note:note.trim()}),
            };
            const nl=[entry,...playedList].slice(0,50);
            await fb.setDoc(uRef,{playedHistory:nl},{merge:true});
            setPlayedList(nl);
            const oName=user.displayName||user.email||'Ktoś';

                                        {e.result&&<span className={`badge badge-${e.result}`}>{RL[e.result]}</span>}
                                    </div>
                                    <div className="act-date">{new Date(e.date).toLocaleDateString('pl-PL',{day:'numeric',month:'short',year:'numeric'})}</div>
                                </div>
                            </div>
                        ))}
                    </div>}
                    {isMutual&&!canSeeFav&&!canSeeHistory&&<div className="empty" style={{paddingTop:30}}>Ta osoba ukryła swoje aktywności i ulubione.</div>}
                    {!isMutual&&<div className="empty" style={{paddingTop:20}}>Dodaj tę osobę do znajomych wzajemnie, aby zobaczyć jej profil.</div>}
                    <button className="btn-danger" style={{marginTop:16}} onClick={()=>remF(f.uid)}><i className="fas fa-user-minus"></i> Usuń ze znajomych</button>
                </div>
            );
        }

        return(<div className="page">
            <h2 className="page-title">Znajomi</h2>
            <div className="tabs-seg"><button className={`tab-seg-btn ${sub==='friends'?'active':''}`} onClick={()=>setSub('friends')}>Znajomi ({friends.length})</button><button className={`tab-seg-btn ${sub==='search'?'active':''}`} onClick={()=>setSub('search')}>Szukaj</button></div>
            {sub==='search'&&<div><div className="search-bar"><input type="text" placeholder="Imię lub email..." value={sq} onChange={e=>setSq(e.target.value)}/><button className="btn-search" onClick={search} disabled={searching}>{searching?'...':'Szukaj'}</button></div>{sErr&&<div className="empty">{sErr}</div>}{res.map(r=>(<div key={r.uid} className="result-card"><div className="friend-row-hdr"><div className="f-avatar">{(r.name||'?').charAt(0).toUpperCase()}</div><div className="f-info"><h5>{r.name}</h5><span>{r.email}</span></div>{friends.includes(r.uid)?<button className="btn-rem-f">✔ Dodano</button>:<button className="btn-add-f" onClick={()=>addF(r.uid)}>+ Dodaj</button>}</div></div>))}</div>}
            {sub==='friends'&&<div>
                {loading&&<div className="empty">Ładowanie...</div>}
                {!loading&&!fData.length&&<div className="empty">Brak znajomych. Znajdź ich w zakładce Szukaj!</div>}
                {fData.map(f=>{
                    const isMutual=(f.friends||[]).includes(user.uid);
                    const fi=f.privacy?.showFavourites!==false?DATA.filter(d=>(f.favourites||[]).includes(d.id)):[];
                    return(<div key={f.uid} className="friend-row" style={{cursor:'pointer'}} onClick={()=>setOpenCard(f)}>
                        <div className="friend-row-hdr">
                            <div className="f-avatar">{(f.name||'?').charAt(0).toUpperCase()}</div>
                            <div className="f-info">
                                <h5>{f.name} {isMutual&&<span style={{fontSize:'0.68em',background:'rgba(181,255,77,0.1)',color:'var(--accent)',border:'1px solid rgba(181,255,77,0.2)',padding:'1px 6px',borderRadius:10,fontWeight:600,marginLeft:4}}>wzajemni</span>}</h5>
                                <span>{fi.length} ulubionych · dotknij aby zobaczyć profil</span>
                            </div>
                            <i className="fas fa-chevron-right" style={{color:'var(--t2)',fontSize:'0.8em',flexShrink:0}}></i>
                        </div>
                        {fi.length>0&&<div className="fav-tags" style={{marginTop:8}} onClick={e=>e.stopPropagation()}>{fi.map(it=><span key={it.id} className="fav-tag">🎾 {it.name}</span>)}</div>}
                    </div>);
                })}
            </div>}
        </div>);
    }
    /* ── APP ── */
    function App() {
        const [view,setView]=useState('home');
        const [drawer,setDrawer]=useState(false);
        const [filterOpen,setFilterOpen]=useState(false);
        const [filtered,setFiltered]=useState(DATA);
        const [mapItem,setMapItem]=useState(null);
        const [venueItem,setVenueItem]=useState(null);
        const [searchView,setSearchView]=useState('list');
        const [user,setUser]=useState(undefined);
        const [favs,setFavs]=useState([]);
        const [homeStats,setHomeStats]=useState(null);
        const [surf,setSurf]=useState('all');
        const [fParking,setFParking]=useState(false);
        const [fTrainers,setFTrainers]=useState(false);
        const [fRental,setFRental]=useState(false);
        const [fShop,setFShop]=useState(false);
        window.__setView=setView;
        useEffect(()=>{const iv=setInterval(()=>{if(window.__firebase){clearInterval(iv);window.__firebase.onAuthStateChanged(window.__firebase.auth,u=>{setUser(u||null);if(u){window.__firebase.getDoc(window.__firebase.doc(window.__firebase.db,'users',u.uid)).then(s=>{
                        if(s.exists()){
                            const d=s.data();
                            setFavs(d.favourites||[]);
                            const played=d.playedHistory||[];
                            const shared=d.sharedGames||[];
                            const all=[...played,...shared];
                            // partner freq
                            const pc={};
                            all.forEach(g=>{
                                const players=g.sport==='padel'?(g.padelOpponents||[]):(g.opponent?[g.opponent]:[]);
                                players.forEach(p=>{if(p)pc[p]=(pc[p]||0)+1;});
                            });
                            const topPartner=Object.entries(pc).sort((a,b)=>b[1]-a[1])[0]||null;
                            const recent=all.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);
                            setHomeStats({total:all.length,wins:all.filter(g=>g.result==='W').length,topPartner,recent,name:d.name||u.displayName||''});
                        }
                    });}else setFavs([]);});}},100);},[]);
        const toggleFav=async(id)=>{if(!user){setView('auth');return;}const fb=window.__firebase;const nf=favs.includes(id)?favs.filter(x=>x!==id):[...favs,id];setFavs(nf);await fb.setDoc(fb.doc(fb.db,'users',user.uid),{favourites:nf},{merge:true});};
        const applyFilters=()=>{
            setFiltered(DATA.filter(it=>{
                if(surf==='ziemna' && !((it.courts.maczka||0)>0)) return false;
                if(surf==='twarda' && !((it.courts.twarda||0)>0)) return false;
                if(surf==='dywan'  && !((it.courts.dywan||0)>0))  return false;
                if(surf==='padel'  && !((it.courts.padel||0)>0))  return false;
                if(fParking  && !it.parking)  return false;
                if(fTrainers && !it.trainers) return false;
                if(fRental   && !it.rental)   return false;
                if(fShop     && !it.shop)     return false;
                return true;
            }));
            setFilterOpen(false);
        };
        const initials=user?.displayName?.charAt(0).toUpperCase()||user?.email?.charAt(0).toUpperCase()||null;
        const NAV_ITEMS=[
            {v:'home',icon:'fa-home',label:'Główna'},
            {v:'search',icon:'fa-search',label:'Szukaj'},
            {v:'favourites',icon:'fa-heart',label:'Ulubione'},
            ...(user?[{v:'friends',icon:'fa-users',label:'Znajomi'}]:[]),
            {v: user?'profile':'auth', icon:'fa-user', label:'Konto'},
        ];
        return (
            <div className="app-shell">
                {/* Desktop sidebar */}
                <nav className="desktop-nav">
                    <div className="logo">ACTIVO</div>
                    {NAV_ITEMS.map(item=>(
                        <button key={item.v} className={`desk-nav-item ${view===item.v||(item.v==='profile'&&view==='profile')||(item.v==='auth'&&view==='auth')?'active':''}`} onClick={()=>setView(item.v)}>
                            <i className={`fas ${item.icon}`}></i>{item.label}
                        </button>
                    ))}
                    <div className="desk-nav-spacer"/>
                    <div className="desk-user-block">
                        {user===undefined?null:user?(
                            <button className="desk-nav-item" onClick={()=>setView('profile')}>
                                <div className="desk-avatar">{initials}</div>
                                <span style={{fontSize:'0.85em',color:'var(--t1)',fontWeight:600}}>{user.displayName||'Konto'}</span>
                            </button>
                        ):(
                            <button className="desk-nav-item" onClick={()=>setView('auth')}><i className="fas fa-sign-in-alt"></i>Zaloguj się</button>
                        )}
                    </div>
                </nav>

                <div className="content-area">
                    {/* Mobile top nav */}
                    <nav className="top-nav">
                        <button className="hamburger" onClick={()=>setDrawer(true)}><i className="fas fa-bars"></i></button>
                        <span className="logo">ACTIVO</span>
                        <div className="nav-right">
                            {user===undefined?<i className="fas fa-spinner fa-spin" style={{color:'var(--t2)'}}></i>:user?<div className="nav-avatar" onClick={()=>setView('profile')}>{initials}</div>:<span style={{cursor:'pointer',fontSize:'0.85em',color:'var(--accent)',fontWeight:600}} onClick={()=>setView('auth')}>Zaloguj</span>}
                        </div>
                    </nav>

                    {/* Mobile drawer */}
                    <div className={`drawer-overlay ${drawer?'show':''}`} onClick={()=>setDrawer(false)}/>
                    <div className={`drawer ${drawer?'open':''}`}>
                        <div className="logo">ACTIVO</div>
                        {NAV_ITEMS.map(item=>(
                            <button key={item.v} className={`drawer-item ${view===item.v?'active':''}`} onClick={()=>{setView(item.v);setDrawer(false);}}>
                                <i className={`fas ${item.icon}`} style={{width:18,textAlign:'center'}}></i>{item.label}
                            </button>
                        ))}
                    </div>

                    {/* Filter panel */}
                    <div className={`drawer-overlay ${filterOpen?'show':''}`} onClick={()=>setFilterOpen(false)}/>
                    <div className={`filter-panel ${filterOpen?'open':''}`}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                            <h3 style={{margin:0,color:'var(--t1)',fontSize:'1em',fontWeight:700}}>Filtry</h3>
                            <button className="btn-close" onClick={()=>setFilterOpen(false)}>✕</button>
                        </div>
                        <label className="field-label">Nawierzchnia / typ</label>
                        <select value={surf} onChange={e=>setSurf(e.target.value)}><option value="all">Wszystkie</option><option value="ziemna">Mączka (ziemna)</option><option value="twarda">Twarda</option><option value="dywan">Dywan</option><option value="padel">Padel</option></select>
                        <label className="field-label" style={{marginTop:18}}>Udogodnienia</label>
                        {[
                            {label:'Parking', state:fParking, set:setFParking},
                            {label:'Trenerzy', state:fTrainers, set:setFTrainers},
                            {label:'Wypożyczalnia sprzętu', state:fRental, set:setFRental},
                            {label:'Sklep', state:fShop, set:setFShop},
                        ].map(f=>(
                            <div key={f.label} onClick={()=>f.set(!f.state)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
                                <span style={{fontSize:'0.86em',color:'var(--t1)'}}>{f.label}</span>
                                <label className="toggle-wrap" style={{pointerEvents:'none'}}>
                                    <input type="checkbox" checked={f.state} readOnly/>
                                    <span className="toggle-track"></span>
                                </label>
                            </div>
                        ))}
                        <button className="btn-primary" style={{marginTop:18}} onClick={applyFilters}>Zastosuj</button>
                    </div>

                    {/* Map modal */}
                    {mapItem&&<MapModal item={mapItem} onClose={()=>setMapItem(null)}/>}
                    {/* Venue detail sheet */}
                    {venueItem&&<VenueSheet item={venueItem} isFav={favs.includes(venueItem.id)} onClose={()=>setVenueItem(null)} onMap={setMapItem} onFav={toggleFav} onReserve={()=>user?alert('Zarezerwowano'):setView('auth')}/>}

                    {/* Views */}
                    {view==='home'&&(
                        <div className="page" style={{paddingTop:20}}>
                            {user&&homeStats?(
                                <>
                                    <div className="hero-section" style={{marginBottom:14}}>
                                        <h2>Cześć, {homeStats.name||'zawodniku'} 👋</h2>
                                        <p style={{marginBottom:10}}>Masz {homeStats.total} aktywności · {homeStats.wins} wygranych{homeStats.topPartner?` · najczęściej z ${homeStats.topPartner[0]}`:''}</p>
                                        <button className="btn-primary" style={{display:'inline-flex',alignItems:'center',gap:7}} onClick={()=>{setView('profile');window.__triggerAdd=true;}}>
                                            <i className="fas fa-plus-circle"></i> Dodaj aktywność
                                        </button>
                                    </div>
                                    {homeStats.topPartner&&<div className="surf-card" style={{marginBottom:14}}>
                                        <h4><i className="fas fa-users" style={{color:'var(--accent)'}}></i> Najczęstszy partner</h4>
                                        <div style={{display:'flex',alignItems:'center',gap:12,padding:'6px 0'}}>
                                            <div style={{width:40,height:40,borderRadius:'50%',background:'var(--s2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:'var(--accent)',fontSize:'1.05em'}}>{homeStats.topPartner[0].charAt(0).toUpperCase()}</div>
                                            <div>
                                                <div style={{fontWeight:700,color:'var(--t1)',fontSize:'0.9em'}}>{homeStats.topPartner[0]}</div>
                                                <div style={{fontSize:'0.75em',color:'var(--t2)',marginTop:1}}>{homeStats.topPartner[1]} wspólnych gier</div>
                                            </div>
                                        </div>
                                    </div>}
                                    {homeStats.recent.length>0&&<div className="surf-card" style={{marginBottom:14}}>
                                        <h4><i className="fas fa-bolt" style={{color:'var(--accent)'}}></i> Ostatnie aktywności</h4>
                                        {homeStats.recent.map((e,i)=>(
                                            <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:i<homeStats.recent.length-1?'1px solid var(--border)':'none'}}>
                                                <div>
                                                    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                                                        <span className={`badge badge-${e.sport||'tenis'}`}>{SE[e.sport||'tenis']} {SL[e.sport||'tenis']}</span>
                                                        <span style={{fontSize:'0.84em',color:'var(--t1)',fontWeight:600}}>{e.court}</span>
                                                        {e.result&&<span className={`badge badge-${e.result}`}>{RL[e.result]}</span>}
                                                    </div>
                                                    <div style={{fontSize:'0.73em',color:'var(--t2)',marginTop:3}}>{new Date(e.date).toLocaleDateString('pl-PL',{day:'numeric',month:'short',year:'numeric'})}</div>
                                                </div>
                                            </div>
                                        ))}
                                        <button className="btn-ghost" style={{width:'100%',marginTop:10,fontSize:'0.82em'}} onClick={()=>setView('profile')}>Zobacz wszystkie →</button>
                                    </div>}
                                    <div className="surf-card">
                                        <h4><i className="fas fa-search" style={{color:'var(--accent)'}}></i> Szukaj kortów</h4>
                                        <p style={{fontSize:'0.82em',color:'var(--t2)',marginBottom:10}}>Znajdź kort w Poznaniu i zarezerwuj miejsce.</p>
                                        <button className="btn-primary" onClick={()=>setView('search')}>Przeglądaj korty</button>
                                    </div>
                                </>
                            ):(
                                <>
                                    <div className="hero-section">
                                        <h2>Znajdź swój kort 🎾</h2>
                                        <p>Najlepsza wyszukiwarka kortów tenisowych i padelowych w Twoim mieście.</p>
                                        <button className="btn-primary" onClick={()=>setView('search')}>Szukaj kortów</button>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                    {view==='search'&&(
                        <div className="page" style={{paddingTop:20}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                                <h2 className="page-title" style={{margin:0}}>Korty</h2>
                                <div style={{display:'flex',gap:8}}>
                                    {/* List/Map toggle */}
                                    <div style={{display:'flex',background:'var(--s2)',border:'1px solid var(--border)',borderRadius:9,padding:3,gap:3}}>
                                        <button onClick={()=>setSearchView('list')} style={{padding:'6px 12px',borderRadius:7,border:'none',fontFamily:'var(--font)',fontSize:'0.78em',fontWeight:600,cursor:'pointer',background:searchView==='list'?'var(--s1)':'transparent',color:searchView==='list'?'var(--accent)':'var(--t2)',transition:'all 0.18s'}}>
                                            <i className="fas fa-list" style={{marginRight:5}}></i>Lista
                                        </button>
                                        <button onClick={()=>setSearchView('map')} style={{padding:'6px 12px',borderRadius:7,border:'none',fontFamily:'var(--font)',fontSize:'0.78em',fontWeight:600,cursor:'pointer',background:searchView==='map'?'var(--s1)':'transparent',color:searchView==='map'?'var(--accent)':'var(--t2)',transition:'all 0.18s'}}>
                                            <i className="fas fa-map" style={{marginRight:5}}></i>Mapa
                                        </button>
                                    </div>
                                    <button className="btn-ghost" onClick={()=>setFilterOpen(true)}><i className="fas fa-sliders-h" style={{marginRight:6}}></i>Filtry</button>
                                </div>
                            </div>

                            {/* MAP VIEW */}
                            {searchView==='map'&&(
                                <div style={{borderRadius:'var(--radius)',overflow:'hidden',border:'1px solid var(--border)',marginBottom:14}}>
                                    <iframe
                                        title="Mapa kortów — Poznań"
                                        width="100%"
                                        height="460"
                                        style={{display:'block',border:'none'}}
                                        loading="lazy"
                                        allowFullScreen
                                        referrerPolicy="no-referrer-when-downgrade"
                                        src="https://www.google.com/maps/embed/v1/place?key=AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY&q=Park+Tenisowy+Olimpia,+Warminska+1,+Poznan&zoom=13&language=pl"
                                    ></iframe>
                                </div>
                            )}

                            {/* LIST VIEW */}
                            {searchView==='list'&&filtered.map(item=>{
                                const tc = totalCourts(item.courts);
                                const pills = [];
                                if (item.courts.maczka) pills.push({ label:`${item.courts.maczka} mączka`, color:'#b5893a' });
                                if (item.courts.twarda) pills.push({ label:`${item.courts.twarda} twarda`, color:'#4a9eff' });
                                if (item.courts.padel)  pills.push({ label:`${item.courts.padel} padel`, color:'var(--accent2)' });
                                if (item.courts.dywan)  pills.push({ label:`${item.courts.dywan} dywan`, color:'#a78bfa' });
                                return (
                                    <div key={item.id} className="card">
                                        <div className="card-body">
                                            <h4 style={{marginBottom:6}}>
                                                <button onClick={()=>setVenueItem(item)} style={{background:'none',border:'none',padding:0,color:'var(--t1)',fontWeight:700,fontFamily:'var(--font)',fontSize:'inherit',cursor:'pointer',textAlign:'left',textDecoration:'underline',textDecorationColor:'var(--border)',textUnderlineOffset:3}}>
                                                    {item.name}
                                                </button>
                                                <span className="courts-badge">{tc}</span>
                                            </h4>
                                            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}}>
                                                {pills.map(p=>(
                                                    <span key={p.label} style={{background:`${p.color}18`,color:p.color,border:`1px solid ${p.color}35`,padding:'2px 8px',borderRadius:20,fontSize:'0.7em',fontWeight:700}}>{p.label}</span>
                                                ))}
                                            </div>
                                            <div className="card-actions">
                                                <button className="btn-heart" onClick={()=>toggleFav(item.id)}>{favs.includes(item.id)?'❤️':'🤍'}</button>
                                                {item.bookingUrl
                                                    ? <a href={item.bookingUrl} target="_blank" rel="noopener noreferrer" className="btn-reserve-card" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}}>Rezerwuj</a>
                                                    : <button className="btn-reserve-card" style={{flex:1,opacity:0.4,cursor:'not-allowed'}} disabled>Brak online</button>
                                                }
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                    {view==='auth'&&<AuthScreen/>}
                    {view==='profile'&&(user?<ProfileScreen user={user}/>:<AuthScreen/>)}
                    {view==='favourites'&&<FavouritesScreen user={user} favourites={favs} onToggleFav={toggleFav}/>}
                    {view==='friends'&&<FriendsScreen user={user}/>}

                    {/* Mobile bottom nav */}
                    <nav className="bottom-nav">
                        {NAV_ITEMS.map(item=>(
                            <button key={item.v} className={`bottom-nav-item ${view===item.v?'active':''}`} onClick={()=>setView(item.v)}>
                                <i className={`fas ${item.icon}`}></i>{item.label}
                            </button>
                        ))}
                    </nav>
                </div>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
